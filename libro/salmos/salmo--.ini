
Salmos 78
Poema. De Asaf. Escucha, pueblo mío, mi enseñanza, presta oído a las palabras de mi boca; voy a abrir mi boca en parábolas, a evocar los misterios del pasado. Lo que hemos oído y que sabemos, lo que nuestros padres nos contaron, no se lo callaremos a sus hijos, a la futura generación lo contaremos: Las alabanzas de Yahvéh y su poder, las maravillas que hizo; él estableció en Jacob un dictamen, y puso una ley en Israel; Él había mandado a nuestros padres que lo comunicaran a sus hijos, que la generación siguiente lo supiera, los hijos que habían de nacer; y que estos se alzaran y se lo contaran a sus hijos, para que pusieran en Dios su confianza, no olvidaran las hazañas de Dios, y sus mandamientos observaran; para que no fueran, lo mismo que sus padres, una generación rebelde y revoltosa, generación de corazón voluble y de espíritu desleal a Dios. Los hijos de Efraím, diestros arqueros, retrocedieron el día del combate; no guardaban la alianza hecha con Dios, rehusaban caminar según su ley; tenían olvidados sus portentos, las maravillas que él les hizo ver: prodigios hizo a la vista de sus padres en el país de Egipto, en los campos de Tanis. Hendió la mar y los pasó a través, contuvo las aguas como un dique; de día los guiaba con la nube, y cada noche con resplandor de fuego; en el desierto hendió las rocas, los abrevó a raudales sin medida; hizo brotar arroyos de la peña y descender las aguas como ríos. Pero ellos volvían a pecar contra él, a rebelarse contra el Altísimo en la estepa; a Dios tentaron en su corazón reclamando manjar para su hambre. Hablaron contra Dios; dijeron: «¿Será Dios capaz de aderezar una mesa en el desierto? «Ved que él hirió la roca, y corrieron las aguas, fluyeron los torrentes: ¿podrá de igual modo darnos pan, y procurar carne a su pueblo?» Entonces Yahvéh lo oyó y se enfureció, un fuego se encendió contra Jacob, y la Cólera estalló contra Israel, porque en Dios no habían tenido fe ni confiaban en su salvación. Y a las nubes mandó desde lo alto, abrió las compuertas de los cielos; hizo llover sobre ellos maná para comer, les dio el trigo de los cielos; pan de Fuertes comió el hombre, les mandó provisión hasta la hartura. Hizo soplar en los cielos el solano, el viento del sur con su poder atrajo, y llovió sobre ellos carne como polvo, y aves como la arena de los mares; las dejó caer en medio de su campo, en torno a sus moradas. Comieron hasta quedar bien hartos, así satisfizo su avidez; más aún no habían colmado su avidez, su comida estaba aún en su boca, cuando la cólera de Dios estalló contra ellos: hizo estragos entre los más fuertes, y abatió a la flor de Israel. Más con todo pecaron todavía, en sus maravillas no tuvieron fe. Él consumió sus días con un soplo, y sus años con espanto. Cuando los mataba, le buscaban, se convertían, se afanaban por él, y recordaban que Dios era su roca, su redentor, el Dios Altísimo. Más le halagaban con su boca, y con su lengua le mentían; su corazón no era fiel para con él, no tenían fe en su alianza. Él, con todo, enternecido, borraba las culpas y no exterminaba; bien de veces su cólera contuvo y no despertó todo su furor: se acordaba de que ellos eran carne, un soplo que se va y no vuelve más. ¡Cuántas veces se rebelaron contra él en el desierto, le irritaron en aquellas soledades! Otra vez a tentar a Dios volvían, a exasperar al Santo de Israel; no se acordaron de su mano, del día en que les libró del adversario; cuando hizo en Egipto sus señales, en el campo de Tanis sus prodigios. Trocó en sangre sus ríos y sus arroyos para que no bebiesen. Tábanos les mandó que los comieron, y ranas que los infestaron; entregó a la langosta sus cosechas, el fruto de su afán al saltamontes; asoló con granizo sus viñedos, y con la helada sus sicómoros; entregó sus ganados al pedrisco y a los rayos sus rebaños. Lanzó contra ellos el fuego de su cólera, indignación, enojo y destrucción, tropel de mensajeros de desgracias; libre curso dio a su ira. No preservó sus almas de la muerte, a la peste sus vidas entregó; hirió en Egipto a todo primogénito, las primicias de la raza en las tiendas de Cam. Y sacó a su pueblo como ovejas, cual rebaño los guió por el desierto; los guió en seguro, sin temor, mientras el mar cubrió a sus enemigos; los llevó a su término santo, a este monte que su diestra conquistó; arrojó a las naciones ante ellos; a cordel les asignó una heredad, y estableció en sus tiendas las tribus de Israel. Pero ellos le tentaron, se rebelaron contra el Dios Altísimo, se negaron a guardar sus dictámenes, se extraviaron, infieles, lo mismo que sus padres, se torcieron igual que un arco indócil: le irritaron con sus altos, con sus ídolos excitaron sus celos. Dios lo oyó y se enfureció, desechó totalmente a Israel; abandonó la morada de Silo, la tienda en que habitaba entre los hombres. Mandó su fuerza al cautiverio, a manos del adversario su esplendor; entregó su pueblo a la espada, contra su heredad se enfureció. El fuego devoró a sus jóvenes, no hubo canto nupcial para sus vírgenes; sus sacerdotes cayeron a cuchillo, sus viudas no entonaron lamentos. Entonces despertó el Señor como un durmiente, como un bravo vencido por el vino; hirió a sus adversarios en la espalda, les infligió un oprobio eterno. Desechó la tienda de José, y no eligió a la tribu de Efraím; más eligió a la tribu de Judá, el monte Sión al cual amaba. Construyó como las alturas del cielo su santuario, como la tierra que fundó por siempre. Y eligió a David su servidor, le sacó de los apriscos del rebaño, le trajo de detrás de las ovejas, para pastorear a su pueblo Jacob, y a Israel, su heredad. Él los pastoreaba con corazón perfecto, y con mano diestra los guiaba.

Salmos 79
Salmo. De Asaf. Oh Dios, han entrado gentiles en tu heredad, han profanado tu santo Templo, han entregado el cadáver de tus siervos por comida a los pájaros del cielo, la carne de tus amigos a las bestias de la tierra. Han derramado como agua su sangre en torno a Jerusalén, ¡y nadie sepultaba! Nos hemos hecho la irrisión de los vecinos, burla y escarnio de nuestros circundantes. ¿Hasta cuándo, Yahvéh, tu cólera? ¿hasta el fin? ¿han de quemar tus celos como fuego? Derrama tu furor sobre las gentes, que no te reconocen, y sobre los reinos que tu nombre no invocan. Porque han devorado a Jacob y han devastado su dominio. No recuerdes contra nosotros culpas de antepasados, vengan presto a nuestro encuentro tus ternuras, pues estamos abatidos del todo; ayúdanos, Dios de nuestra salvación, por amor de la gloria de tu nombre; líbranos, borra nuestros pecados, por causa de tu nombre. ¿Por qué han de decir las gentes: «¿Dónde está su Dios?» ¡Que entre las gentes se conozca, a nuestros propios ojos, la venganza de la sangre de tus siervos derramada! ¡Llegue hasta ti el suspiro del cautivo, con la grandeza de tu brazo preserva a los hijos de la muerte! ¡Devuelve siete veces a nuestros vecinos, en su entraña, su afrenta, la afrenta que te han hecho, Señor! Y nosotros, tu pueblo, rebaño de tu pasto, eternamente te daremos gracias, de edad en edad repetiremos tu alabanza.

Salmos 80
Del maestro de coro. Según la melodía: «Lirios es el dictamen.» De Asaf. Salmo. Pastor de Israel, escucha, tú que guías a José cual rebaño, tú que te sientas sobre querubines, ¡resplandece ante Efraím, Benjamín y Manasés; ¡despierta tu poderío, y ven en nuestro auxilio! ¡Oh Dios, haznos volver, y que brille tu rostro, para que seamos salvos! ¿Hasta cuándo, oh Yahvéh Dios Sebaot, estarás airado contra la plegaria de tu pueblo? Les das a comer un pan de llanto les haces beber lágrimas al triple; habladuría nos haces de nuestros convecinos, y nuestros enemigos se burlan de nosotros. ¡Oh Dios Sebaot, haznos volver, y brille tu rostro, para que seamos salvos! Una viña de Egipto arrancaste, expulsaste naciones para plantarla a ella, le preparaste el suelo, y echó raíces y llenó la tierra. Su sombra cubría las montañas, sus pámpanos los cedros de Dios; extendía sus sarmientos hasta el mar, hasta el Río sus renuevos. ¿Por qué has hecho brecha en sus tapias, para que todo el que pasa por el camino la vendimie, el jabalí salvaje la devaste, y la pele el ganado de los campos? ¡Oh Dios Sebaot, vuélvete ya, desde los cielos mira y ve, visita a esta viña, cuídala, a ella, la que plantó tu diestra! ¡Los que fuego le prendieron, cual basura, a la amenaza de tu faz perezcan! Esté tu mano sobre el hombre de tu diestra, sobre el hijo de Adán que para ti fortaleciste. Ya no volveremos a apartarnos de ti; nos darás vida y tu nombre invocaremos. ¡Oh Yahvéh, Dios Sebaot, haznos volver, y que brille tu rostro, para que seamos salvos!

Salmos 81
Del maestro de coro. Según la... de Gat. De Asaf. Gritad de júbilo a Dios, fuerza nuestra, aclamad al Dios de Jacob; ¡entonad la salmodia, tocad el tamboril, la melodiosa cítara y el arpa; tocad la trompeta al nuevo mes, a la luna llena, el día de nuestra fiesta! Porque es una ley para Israel, una norma del Dios de Jacob; un dictamen que él impuso en José, cuando salió contra el país de Egipto. Una lengua desconocida se oye: «Yo liberé sus hombros de la carga, sus manos la espuerta abandonaron; en la aflicción gritaste y te salvé. «Te respondí en el secreto del trueno, te probé junto a las aguas de Meribá. Pausa. Escucha, pueblo mío, yo te conjuro, ¡ah Israel, si quisieras escucharme! «No haya en ti dios extranjero, no te postres ante dios extraño; yo, Yahvéh, soy tu Dios, que te hice subir del país de Egipto; abre toda tu boca, y yo la llenaré. «Pero mi pueblo no escuchó mi voz, Israel no me quiso obedecer; yo les abandoné a la dureza de su corazón, para que caminaran según sus designios. «¡Ah!, si mi pueblo me escuchara, si Israel mis caminos siguiera, al punto yo abatiría a sus enemigos, contra sus adversarios mi mano volvería. «Los que odian a Yahvéh le adularían, y su tiempo estaría para siempre fijado; y a él lo sustentaría con la flor del trigo, lo saciaría con la miel de la peña.»

Salmos 82
Salmo. De Asaf. Dios se yergue en la asamblea divina, en medio de los dioses juzga: «¿Hasta cuándo juzgaréis inicuamente, y haréis acepción de los impíos? Juzgad en favor del débil y del huérfano, al humilde, al indigente haced justicia; al débil y al pobre liberad, de la mano de los impíos arrancadle!» Pausa. No saben ni comprenden; caminan en tinieblas, todos los cimientos de la tierra vacilan. Yo había dicho: «¡Vosotros, dioses sois, todos vosotros, hijos del Altísimo!» Más ahora, como el hombre moriréis, como uno solo caeréis, príncipes. ¡Álzate, oh Dios, juzga a la tierra, pues tú eres el señor de todas las naciones!

Salmos 83
Cántico. Salmo. De Asaf. ¡Oh Dios, no te estés mudo, cese ya tu silencio y tu reposo, oh Dios! Mira cómo tus enemigos braman, los que te odian levantan la cabeza. Contra tu pueblo maquinan intriga, conspiran contra tus protegidos; dicen: «Venid, borrémoslos de las naciones, no se recuerde más el nombre de Israel!» Así conspiran de corazón a una, pactan una alianza contra ti: las tiendas de Edom, los ismaelitas, Moab y los hagreos, Guebal, Ammón, Amalec, Filistea con los habitantes de Tiro; también Assur se ha juntado a ellos y se hace el brazo de los hijos de Lot. Trátalos como a Madián y como a Sísara, Pausa. como a Yabín en el torrente de Quisón, que fueron exterminados en Endor, quedaron hechos estiércol de la tierra. Trata a sus caudillos como a Oreb y Zeeb, a todos sus príncipes como a Zébaj y a Salmunná, que habían dicho: «¡Para nosotros conquistemos los dominios de Dios!» Dios mío, ponlos como hoja en remolino, como paja ante el viento. Como el fuego abrasa una selva, como la llama devora las montañas, así persíguelos con tu tormenta, con tu huracán llénalos de terror. Cubre sus rostros de ignominia, para que busquen tu nombre, Yahvéh. ¡Sean avergonzados y aterrados para siempre, queden confusos y perezcan, para que sepan que solo tú tienes el nombre de Yahvéh, Altísimo sobre toda la tierra!

Salmos 84
Del maestro de coro. Según la... de Gat. De los hijos de Coré. Salmo. ¡Qué amables son tus moradas, Yahvéh Sebaot! Anhela mi alma y languidece tras de los atrios de Yahvéh, mi corazón y mi carne gritan de alegría hacia el Dios vivo. Hasta el pajarillo ha encontrado una casa, y para sí la golondrina un nido donde poner a sus polluelos: ¡Tus altares, oh Yahvéh Sebaot, rey mío y Dios mío! Pausa. Dichosos los que moran en tu casa, te alaban por siempre. Dichosos los hombres cuya fuerza está en ti, y las subidas en su corazón. Al pasar por el valle del Bálsamo, lo hacen un hontanar, y la lluvia primera lo cubre de bendiciones. De altura en altura marchan, y Dios se les muestra en Sión. ¡Yahvéh Dios Sebaot, escucha mi plegaria, tiende tu oído, oh Dios de Jacob! Oh Dios, escudo nuestro, mira, pon tus ojos en el rostro de tu ungido. Pausa. Vale más un día en tus atrios que mil en mis mansiones, estar en el umbral de la Casa de mi Dios que habitar en las tiendas de impiedad. Porque Yahvéh Dios es almena y escudo, él da gracia y gloria; Yahvéh no niega la ventura a los que caminan en la perfección. ¡Oh Yahvéh Sebaot, dichoso el hombre que confía en ti!

Salmos 85
Del maestro de coro. De los hijos de Coré. Salmo. Propicio has sido, Yahvéh, con tu tierra, has hecho volver a los cautivos de Jacob; has quitado la culpa de tu pueblo, has cubierto todos sus pecados, Pausa. has retirado todo tu furor, has desistido del ardor de tu cólera. ¡Haznos volver, Dios de nuestra salvación, cesa en tu irritación contra nosotros! ¿Vas a estar siempre airado con nosotros? ¿Prolongarás tu cólera de edad en edad? ¿No volverás a darnos vida para que tu pueblo en ti se regocije? ¡Muéstranos tu amor, Yahvéh, y danos tu salvación! Voy a escuchar de qué habla Dios. Sí, Yahvéh habla de paz para su pueblo y para sus amigos, con tal que a su torpeza no retornen. Ya está cerca su salvación para quienes le temen, y la Gloria morará en nuestra tierra. Amor y Verdad se han dado cita, Justicia y Paz se abrazan; la Verdad brotará de la tierra, y de los cielos se asomará la Justicia. El mismo Yahvéh dará la dicha, y nuestra tierra su cosecha dará; La Justicia marchará delante de él, y con sus pasos trazará un camino.

Salmos 86
Oración. De David. Tiende tu oído, Yahvéh, respóndeme, que soy pobre y desdichado; guarda mi alma, porque yo te amo, salva a tu siervo que confía en ti. Tú eres mi Dios, tenme piedad, Señor, pues a ti clamo todo el día; recrea el alma de tu siervo, cuando hacia ti, Señor, levanto mi alma. Pues tú eres, Señor, bueno, indulgente, rico en amor para todos los que te invocan; Yahvéh, presta oído a mi plegaria, atiende a la voz de mis súplicas. En el día de mi angustia yo te invoco, pues tú me has de responder; entre los dioses, ninguno como tú, Señor, ni obras como las tuyas. Vendrán todas las naciones a postrarse ante ti, y a dar, Señor, gloria a tu nombre; pues tú eres grande y obras maravillas, tú, Dios, y solo tú. Enséñame tus caminos Yahvéh, para que yo camine en tu verdad, concentra mi corazón en el temor de tu nombre. Gracias te doy de todo corazón, Señor Dios mío, daré gloria a tu nombre por siempre, pues grande es tu amor para conmigo, tú has librado mi alma del fondo del seol. Oh Dios, los orgullosos se han alzado contra mí, una turba de violentos anda buscando mi alma, y no te tienen a ti delante de sus ojos. Más tú, Señor, Dios clemente y compasivo, tardo a la cólera, lleno de amor y de verdad, ¡vuélvete a mí, tenme compasión! Da tu fuerza a tu siervo, salva al hijo de tu sierva. Haz conmigo un signo de bondad: Que los que me odian vean, avergonzados, que tú, Yahvéh, me ayudas y consuelas.

Salmos 87
De los hijos de Coré. Salmo. Cántico. Su asiento está en el monte santo, ama Yahvéh: las puertas de Sión más que todas las moradas de Jacob. Glorias se dicen de ti, ciudad de Dios: Pausa. «Yo cuento a Ráhab y Babel entre los que me conocen. Tiro, Filistea y Etiopía, fulano nació allí.» Pero de Sión se ha de decir: «Todos han nacido en ella», y quien la funda es el propio Altísimo. Yahvéh a los pueblos inscribe en el registro: «Fulano nació allí», Pausa. y los príncipes, lo mismo que los hijos, todos ponen su mansión en ti.

Salmos 88
Cántico. Salmo. De los hijos de Coré. Del maestro de coro. Para la enfermedad. Para la aflicción. Poema. De Hemán el indígena. Yahvéh, Dios de mi salvación, de día clamo, y de noche en tu presencia; llegue hasta ti mi súplica, presta oído a mi clamor. Porque mi alma de males está ahíta, y mi vida está al borde del seol; contado entre los que bajan a la fosa, soy como un hombre acabado: relegado entre los muertos, como los cadáveres que yacen en la tumba, aquellos de los que no te acuerdas más, que están arrancados de tu mano. Me has echado en lo profundo de la fosa, en las tinieblas, en los abismos; sobre mí pesa tu furor, con todas tus olas me hundes. Pausa. Has alejado de mí a mis conocidos, me has hecho para ellos un horror, cerrado estoy y sin salida, mi ojo se consume por la pena. Yo te llamo, Yahvéh, todo el día, tiendo mis manos hacia ti. Pausa. ¿Acaso para los muertos haces maravillas, o las sombras se alzan a alabarte? ¿Se habla en la tumba de tu amor, de tu lealtad en el lugar de perdición? ¿Se conocen en las tinieblas tus maravillas, o tu justicia en la tierra del olvido?» Más yo grito hacia ti, Yahvéh, de madrugada va a tu encuentro mi oración; ¿por qué, Yahvéh, mi alma rechazas, lejos de mí tu rostro ocultas? Desdichado y agónico estoy desde mi infancia, he soportado tus terrores, y ya no puedo más; han pasado tus iras sobre mí, tus espantos me han aniquilado. Me envuelven como el agua todo el día, se aprietan contra mí todos a una. Has alejado de mí compañeros y amigos, son mi compañía las tinieblas.

Salmos 89
Poema. De Etán el indígena. El amor de Yahvéh por siempre cantaré, de edad en edad anunciará mi boca tu lealtad. Pues tú dijiste: «Cimentado está el amor por siempre, asentada en los cielos mi lealtad. «Una alianza pacté con mi elegido, un juramento hice a mi siervo David: «Para siempre jamás he fundado tu estirpe, de edad en edad he erigido tu trono.» Pausa. Los cielos celebran, Yahvéh, tus maravillas, y tu lealtad en la asamblea de los santos. Porque ¿quién en las nubes es comparable a Yahvéh, quién a Yahvéh se iguala entre los hijos de los dioses? Dios temible en el consejo de los santos, grande y terrible para toda su corte. Yahvéh, Dios Sebaot, ¿quién como tú?, poderoso eres, Yahvéh, tu lealtad te circunda. Tú domeñas el orgullo del mar, cuando sus olas se encrespan las reprimes; tú machacaste a Ráhab lo mismo que a un cadáver, a tus enemigos dispersaste con tu potente brazo. Tuyo es el cielo, tuya también la tierra, el orbe y cuanto encierra tú fundaste; tú creaste el norte y el mediodía, el Tabor y el Hermón exultan en tu nombre. Tuyo es el brazo y su bravura, poderosa tu mano, sublime tu derecha; Justicia y Derecho, la base de tu trono, Amor y Verdad ante tu rostro marchan. Dichoso el pueblo que la aclamación conoce, a la luz de tu rostro caminan, oh Yahvéh; en tu nombre se alegran todo el día, en tu justicia se entusiasman. Pues tú eres el esplendor de su potencia, por tu favor exaltas nuestra frente; sí, de Yahvéh nuestro escudo; del Santo de Israel es nuestro rey. Antaño hablaste tú en visión a tus amigos, y dijiste: «He prestado mi asistencia a un bravo, he exaltado a un elegido de mi pueblo. «He encontrado a David mi servidor, con mi óleo santo le he ungido; mi mano será firme para él, y mi brazo le hará fuerte. «No le ha de sorprender el enemigo, el hijo de iniquidad no le oprimirá; yo aplastaré a sus adversarios ante él, heriré a los que le odian. «Mi lealtad y mi amor irán con él, por mi nombre se exaltará su frente; pondré su mano sobre el mar, sobre los ríos su derecha. «Él me invocará: ¡Tú, mi Padre, mi Dios y roca de mi salvación! Y yo haré de él el primogénito, el Altísimo entre los reyes de la tierra. «Le guardaré mi amor por siempre, y mi alianza será leal con él; estableceré su estirpe para siempre, y su trono como los días de los cielos. «Si sus hijos abandonan mi ley, y no siguen mis juicios, si profanan mis preceptos, y mis mandamientos no observan, «castigaré su rebelión con vara, y su culpa con azote, más no retiraré de él mi amor, en mi lealtad no fallaré. «No violaré mi alianza, no cambiaré lo que sale de mis labios; una vez he jurado por mi santidad: ¡a David no he de mentir! «Su estirpe durará por siempre, y su trono como el sol ante mí, por siempre se mantendrá como la luna, testigo fiel en el cielo.» Pausa. Pero tú has rechazado y despreciado, contra tu ungido te has enfurecido; has desechado la alianza con tu siervo, has profanado por tierra su diadema. Has hecho brecha en todos sus vallados, sus plazas fuertes en ruina has convertido; le han saqueado todos los transeúntes, se ha hecho el baldón de sus vecinos. A sus adversarios la diestra has exaltado, a todos sus enemigos has llenado de gozo; has embotado el filo de su espada, y no le has sostenido en el combate. Le has quitado su cetro de esplendor, y su trono por tierra has derribado; has abreviado los días de su juventud, le has cubierto de ignominia. Pausa. ¿Hasta cuándo te esconderás, Yahvéh? ¿arderá tu furor por siempre como fuego? Recuerda, Señor, qué es la existencia, para qué poco creaste a los hijos de Adán. ¿Qué hombre podrá vivir sin ver la muerte, quién librará su alma de la garra del seol? Pausa. ¿Dónde están tus primeros amores, Señor, que juraste a David por tu lealtad? Acuérdate, Señor, del ultraje de tus siervos: cómo recibo en mi seno todos los dardos de los pueblos; así ultrajan tus enemigos, Yahvéh, así ultrajan las huellas de tu ungido. ¡Bendito sea Yahvéh por siempre! ¡Amén! ¡Amén!

Salmos 90
Oración. De Moisés, hombre de Dios. Señor, tú has sido para nosotros un refugio de edad en edad. Antes que los montes fuesen engendrados, antes que naciesen tierra y orbe, desde siempre hasta siempre tú eres Dios. Tú al polvo reduces a los hombres, diciendo: «¡Tornad, hijos de Adán!» Porque mil años a tus ojos son como el ayer, que ya pasó, como una vigilia de la noche. Tú los sumerges en un sueño, a la mañana serán como hierba que brota; por la mañana brota y florece, por la tarde se amustia y se seca. Pues por tu cólera somos consumidos, por tu furor anonadados. Has puesto nuestras culpas ante ti, a la luz de tu faz nuestras faltas secretas. Bajo tu enojo declinan todos nuestros días, como un suspiro consumimos nuestros años. Los años de nuestra vida son unos setenta, u ochenta, si hay vigor; más son la mayor parte trabajo y vanidad, pues pasan presto y nosotros nos volamos. ¿Quién conoce la fuerza de tu cólera, y, temiéndote, tu indignación? ¡Enséñanos a contar nuestros días, para que entre la sabiduría en nuestro corazón! ¡Vuelve, Yahvéh! ¿Hasta cuándo? Ten piedad de tus siervos. Sácianos de tu amor a la mañana, que exultemos y cantemos toda nuestra vida. Devuélvenos en gozo los días que nos humillaste, los años en que desdicha conocimos. ¡Que se vea tu obra con tus siervos, y tu esplendor sobre sus hijos! ¡La dulzura del Señor sea con nosotros! ¡Confirma tú la acción de nuestras manos!

Salmos 91
El que mora en el secreto de Elyón pasa la noche a la sombra de Sadday, diciendo a Yahvéh: «¡Mi refugio y fortaleza, mi Dios, en quien confío!» Que él te libra de la red del cazador, de la peste funesta; con sus plumas te cubre, y bajo sus alas tienes un refugio: escudo y armadura es su verdad. No temerás el terror de la noche, ni la saeta que de día vuela, ni la peste que avanza en las tinieblas, ni el azote que devasta a mediodía. Aunque a tu lado caigan mil y diez mil a tu diestra, a ti no ha de alcanzarte. Basta con que mires con tus ojos, verás el galardón de los impíos, tú que dices: «¡Mi refugio es Yahvéh!», y tomas a Elyón por defensa. No ha de alcanzarte el mal, ni la plaga se acercará a tu tienda; que él dará orden sobre ti a sus ángeles de guardarte en todos tus caminos. Te llevarán ellos en sus manos, para que en piedra no tropiece tu pie; pisarás sobre el león y la víbora, hollarás al leoncillo y al dragón. Pues él se abraza a mí, yo he de librarle; le exaltaré, pues conoce mi nombre. Me llamará y le responderé; estaré a su lado en la desgracia, le libraré y le glorificaré. Hartura le daré de largos días, y haré que vea mi salvación.

Salmos 92
Salmo. Cántico para el día de sábado. Bueno es dar gracias a Yahvéh, y salmodiar a tu nombre, Altísimo, publicar tu amor por la mañana, y tu lealtad por las noches, al son del arpa de diez cuerdas y la lira, con un susurro de cítara. Pues con tus hechos, Yahvéh, me regocijas, ante las obras de tus manos grito: «¡Qué grandes son tus obras, Yahvéh, qué hondos tus pensamientos!» El hombre estúpido no entiende, el insensato no comprende estas cosas. Si brotan como hierba los impíos, si florecen todos los agentes de mal, es para ser destruidos por siempre; más tú, Yahvéh, eres excelso por los siglos. Mira cómo tus enemigos perecen, se dispersan todos los agentes de mal. Pero tú alzas mi frente como la del búfalo, derramas sobre mí aceite nuevo; mi ojo desafía a los que me acechaban, mi oído escucha a los malvados. Florece el justo como la palmera, crece como un cedro del Líbano. Plantados en la Casa de Yahvéh, dan flores en los atrios del Dios nuestro. Todavía en la vejez producen fruto, se mantienen frescos y lozanos, para anunciar lo recto que es Yahvéh: mi Roca, no hay falsedad en él.

Salmos 93
Yahvéh reina, de majestad vestido, Yahvéh vestido, ceñido de poder, y el orbe está seguro, no vacila. Desde el principio tu trono esta fijado, desde siempre existes tú. Levantan los ríos, Yahvéh, levantan los ríos su voz, los ríos levantan su bramido; más que la voz de muchas aguas más imponente que las ondas del mar, es imponente Yahvéh en las alturas. Son veraces del todo tus dictámenes; la santidad es el ornato de tu Casa, oh Yahvéh, por el curso de los días.

Salmos 94
¡Dios de las venganzas, Yahvéh, Dios de las venganzas, aparece! ¡Levántate, juez de la tierra, da su merecido a los soberbios! ¿Hasta cuándo los impíos, Yahvéh, hasta cuándo triunfarán los impíos? Cacarean, dicen insolencias, se pavonean todos los agentes de mal. A tu pueblo, Yahvéh, aplastan, a tu heredad humillan. Matan al forastero y a la viuda, asesinan al huérfano. Y dicen: «No lo ve Yahvéh, el Dios de Jacob no se da cuenta.» ¡Comprended, estúpidos del pueblo!, insensatos, ¿cuándo vais a ser cuerdos? El que plantó la oreja, ¿no va a oír? El que formó los ojos, ¿no ha de ver? El que corrige a las naciones, ¿no ha de castigar? El que el saber al hombre enseña, Yahvéh, conoce los pensamientos del hombre, que no son más que un soplo. Dichoso el hombre a quien corriges tú, Yahvéh, a quien instruyes por tu ley, para darle descanso en los días de desgracia, mientras se cava para el impío la fosa. Pues Yahvéh no dejará a su pueblo, no abandonará a su heredad; sino que el juicio volverá a la justicia, y en pos de ella todos los de recto corazón. ¿Quién se alzará por mí contra los malvados? ¿quién estará por mí contra los agentes de mal? Si Yahvéh no viniese en mi ayuda, bien presto mi alma moraría en el silencio. Cuando digo: «Vacila mi pie», tu amor, Yahvéh, me sostiene; en el colmo de mis cuitas interiores, tus consuelos recrean mi alma. ¿Eres aliado tú de un tribunal de perdición, que erige en ley la tiranía? Se atropella la vida del justo, la sangre inocente se condena. Más Yahvéh es para mí una ciudadela, mi Dios la roca de mi amparo; él hará recaer sobre ellos su maldad, los aniquilará por su malicia, Yahvéh, nuestro Dios, los aniquilará.

Salmos 95
Venid, cantemos gozosos a Yahvéh, aclamemos a la Roca de nuestra salvación; con acciones de gracias vayamos ante él, aclamémosle con salmos. Porque es Yahvéh un Dios grande, Rey grande sobre todos los dioses; en sus manos están las honduras de la tierra, y suyas son las cumbres de los montes; suyo el mar, pues él mismo lo hizo, y la tierra firme que sus manos formaron. Entrad, adoremos, prosternémonos, ¡de rodillas ante Yahvéh que nos ha hecho! Porque él es nuestro Dios, y nosotros el pueblo de su pasto, el rebaño de su mano. ¡Oh, si escucharais hoy su voz!: «No endurezcáis vuestro corazón como en Meribá, como el día de Massá en el desierto, donde me pusieron a prueba vuestros padres, me tentaron aunque habían visto mi obra. «Cuarenta años me asqueó aquella generación, y dije: Pueblo son de corazón torcido, que mis caminos no conocen. Y por eso en mi cólera juré: ¡No han de entrar en mi reposo!»

Salmos 96
¡Cantad a Yahvéh un canto nuevo, cantad a Yahvéh, toda la tierra, cantad a Yahvéh, su nombre bendecid! Anunciad su salvación día tras día, contad su gloria a las naciones, a todos los pueblos sus maravillas. Que grande es Yahvéh, y muy digno de alabanza, más temible que todos los dioses. Pues nada son todos los dioses de los pueblos. Más Yahvéh los cielos hizo; gloria y majestad están ante él, poder y fulgor en su santuario. Rendid a Yahvéh, familias de los pueblos, rendid a Yahvéh gloria y poder, rendid a Yahvéh la gloria de su nombre. Traed ofrendas y en sus atrios entrad, postraos ante Yahvéh en esplendor sagrado, ¡tiemble ante su faz la tierra entera! Decid entre las gentes: «¡Yahvéh es rey!» El orbe está seguro, no vacila; él gobierna a los pueblos rectamente. ¡Alégrense los cielos, regocíjese la tierra, retumbe el mar y cuanto encierra; exulte el campo y cuanto en él existe, griten de júbilo todos los árboles del bosque, ante la faz de Yahvéh, pues viene él, viene, sí, a juzgar la tierra! Él juzgará al orbe con justicia, a los pueblos con su lealtad.

Salmos 97
¡Reina Yahvéh! ¡La tierra exulte, alégrense las islas numerosas! Nube y Bruma densa en torno a él, Justicia y Derecho, la base de su trono. Delante de él avanza fuego y a sus adversarios en derredor abrasa; iluminan el orbe sus relámpagos, lo ve la tierra y se estremece. Los montes como cera se derriten ante el Dueño de la tierra toda; los cielos anuncian su justicia, y todos los pueblos ven su gloria. ¡Se avergüenzan los que sirven a los ídolos, los que se glorían de vanidades; se postran ante él todos los dioses! Sión lo oye y se alboroza, exultan las hijas de Judá a causa de tus juicios, Yahvéh. Porque tú eres Yahvéh, el Altísimo sobre toda la tierra, muy por encima de los dioses todos. Yahvéh ama a los que el mal detestan, él guarda las almas de sus fieles y de la mano de los impíos los libra. La luz se alza para el justo, y para los de recto corazón la alegría. Justos, alegraos en Yahvéh, celebrad su memoria sagrada.

Salmos 98
Salmo. Cantad a Yahvéh un canto nuevo, porque ha hecho maravillas; victoria le ha dado su diestra y su brazo santo. Yahvéh ha dado a conocer su salvación, a los ojos de las naciones ha revelado su justicia; se ha acordado de su amor y su lealtad para con la casa de Israel. Todos los confines de la tierra han visto la salvación de nuestro Dios. ¡Aclamad a Yahvéh, toda la tierra, estallad, gritad de gozo y salmodiad! Salmodiad para Yahvéh con la cítara, con la cítara y al son de la salmodia; con las trompetas y al son del cuerno aclamad ante la faz del rey Yahvéh. Brama el mar y cuanto encierra, el orbe y los que le habitan; los ríos baten palmas, a una los montes gritan de alegría, ante el rostro de Yahvéh, pues viene a juzgar a la tierra; él juzgará al orbe con justicia, y a los pueblos con equidad.

Salmos 99
Yahvéh reina, los pueblos tiemblan; se sienta en querubines, la tierra se estremece; grande es Yahvéh en Sión. Excelso sobre los pueblos todos; loen tu nombre grande y venerable: santo es él. Poderoso rey que el juicio ama, tú has fundado el derecho, juicio y justicia tú ejerces en Jacob. Exaltad a Yahvéh nuestro Dios, postraos ante el estrado de sus pies: santo es él. Moisés y Aarón entre sus sacerdotes, Samuel entre aquellos que su nombre invocaban, invocaban a Yahvéh y él les respondía. En la columna de nube les hablaba, ellos guardaban sus dictámenes, la ley que él les dio. Yahvéh, Dios nuestro, tú les respondías, Dios paciente eras para ellos, aunque vengabas sus delitos. Exaltad a Yahvéh nuestro Dios, postraos ante su monte santo: santo es Yahvéh, nuestro Dios.

Salmos 100
Salmo. Para la acción de gracias. ¡Aclamad a Yahvéh, toda la tierra, servid a Yahvéh con alegría, llegaos ante él entre gritos de júbilo! Sabed que Yahvéh es Dios, él nos ha hecho y suyos somos, su pueblo y el rebaño de su pasto. ¡Entrad en sus pórticos con acciones de gracias, con alabanzas en sus atrios, dadle gracias, bendecid su nombre! Porque es bueno Yahvéh, para siempre su amor, por todas las edades su lealtad.

Salmos 101
De David. Salmo. Voy a cantar el amor y el derecho, para ti, Yahvéh, salmodiaré; cursaré el camino de la perfección: ¿cuándo vendrás a mí? Procederé con corazón perfecto, dentro de mi casa; no pondré delante de mis ojos cosa villana. Detesto la conducta de los extraviados, no se me pegará; el corazón perverso está lejos de mí, no conozco al malvado. Al que infama a su prójimo en secreto, a ese le aniquilo; ojo altanero y corazón hinchado no los soporto. Mis ojos, en los fieles de la tierra, por que vivan conmigo; el que anda por el camino de la perfección será mi servidor. No mora dentro de mi casa el agente de engaño; el que dice mentiras no persiste delante de mis ojos. Cada mañana he de aniquilar a todos los impíos del país, para extirpar de la ciudad de Yahvéh a todos los agentes de mal.

Salmos 102
Oración del afligido que, en su angustia, derrama su llanto ante Yahvéh. ¡Yahvéh, escucha mi oración, no ocultes lejos de mí tu rostro el día de mi angustia; tiende hacia mí tu oído, ¡el día en que te invoco, presto, respóndeme! Pues mis días en humo se disipan, mis huesos arden lo mismo que un brasero; trillado como el heno, mi corazón se seca, y me olvido de comer mi pan; ante la voz de mis sollozos, mi piel a mis huesos se ha pegado. Me parezco al búho del yermo, igual que la lechuza de las ruinas; insomne estoy y gimo cual solitario pájaro en tejado; me insultan todo el día mis enemigos, los que me alababan maldicen por mi nombre. El pan que como es la ceniza, mi bebida mezclo con mis lágrimas, ante tu cólera y tu enojo, pues tú me alzaste y después me has tirado: mis días son como la sombra que declina, y yo me seco como el heno. Más tú, Yahvéh, permaneces para siempre, y tu memoria de edad en edad. Tú te alzarás, compadecido de Sión, pues es ya tiempo de apiadarte de ella, ha llegado la hora; que están tus siervos encariñados de sus piedras y se compadecen de sus ruinas. Y temerán las naciones el nombre de Yahvéh, y todos los reyes de la tierra tu gloria; cuando Yahvéh reconstruya a Sión, y aparezca en su gloria, volverá su rostro a la oración del despojado, su oración no despreciará. Se escribirá esto para la edad futura, y en pueblo renovado alabará a Yahvéh: que se ha inclinado Yahvéh desde su altura santa, desde los cielos ha mirado a la tierra, para oír el suspiro del cautivo, para librar a los hijos de la muerte. Para pregonar en Sión el nombre de Yahvéh, y su alabanza en Jerusalén, cuando a una se congreguen los pueblos, y los reinos para servir a Yahvéh. Él ha enervado mi fuerza en el camino, ha abreviado mis días. Digo: ¡Dios mío, en la mitad de mis días no me lleves! ¡De edad en edad duran tus años! Desde antiguo, fundaste tú la tierra, y los cielos son la obra de tus manos; ellos perecen, más tú quedas, todos ellos como la ropa se desgastan, como un vestido los mudas tú, y se mudan. Pero tú siempre el mismo, no tienen fin tus años. Los hijos de tus siervos tendrán una morada, y su estirpe ante ti subsistirá.

Salmos 103
De David. Bendice a Yahvéh, alma mía, del fondo de mi ser, su santo nombre, bendice a Yahvéh, alma mía, no olvides sus muchos beneficios. Él, que todas tus culpas perdona, que cura todas tus dolencias, rescata tu vida de la fosa, te corona de amor y de ternura, satura de bienes tu existencia, mientras tu juventud se renueva como el águila. Yahvéh, el que hace obras de justicia, y otorga el derecho a todos los oprimidos, manifestó sus caminos a Moisés, a los hijos de Israel sus hazañas. Clemente y compasivo es Yahvéh, tardo a la cólera y lleno de amor; no se querella eternamente ni para siempre guarda su rencor; no nos trata según nuestros pecados ni nos paga conforme a nuestras culpas. Como se alzan los cielos por encima de la tierra, así de grande es su amor para quienes le temen; tan lejos como está el oriente del ocaso aleja él de nosotros nuestras rebeldías. Cual la ternura de un padre para con sus hijos, así de tierno es Yahvéh para quienes le temen; que él sabe de qué estamos plasmados, se acuerda de que somos polvo. ¡El hombre! Como la hierba son sus días, como la flor del campo, así florece; pasa por él un soplo, y ya no existe, ni el lugar donde estuvo vuelve a conocerle. Más el amor de Yahvéh desde siempre hasta siempre para los que le temen, y su justicia para los hijos de sus hijos, para aquellos que guardan su alianza, y se acuerdan de cumplir sus mandatos. Yahvéh en los cielos asentó su trono, y su soberanía en todo señorea. Bendecid a Yahvéh, ángeles suyos, héroes potentes, ejecutores de sus órdenes, en cuanto oís la voz de su palabra. Bendecid a Yahvéh, todas sus huestes, servidores suyos, ejecutores de su voluntad. Bendecid a Yahvéh, todas sus obras, en todos los lugares de su imperio. ¡Bendice a Yahvéh, alma mía!

Salmos 104
¡Alma mía, bendice a Yahvéh! ¡Yahvéh, Dios mío, qué grande eres! Vestido de esplendor y majestad, arropado de luz como de un manto, tú despliegas los cielos lo mismo que una tienda, levantas sobre las aguas tus altas moradas; haciendo de las nubes carro tuyo, sobre las alas del viento te deslizas; tomas por mensajeros a los vientos, a las llamas del fuego por ministros. Sobre sus bases asentaste la tierra, inconmovible para siempre jamás. Del océano, cual vestido, la cubriste, sobre los montes persistían las aguas; al increparlas tú, emprenden la huida, se precipitan al oír tu trueno, y saltan por los montes, descienden por los valles, hasta el lugar que tú les asignaste; un término les pones que no crucen, por que no vuelvan a cubrir la tierra. Haces manar las fuentes en los valles, entre los montes se deslizan; a todas las bestias de los campos abrevan, en ellas su sed apagan los onagros; sobre ellas habitan las aves de los cielos, dejan oír su voz entre la fronda. De tus altas moradas abrevas las montañas, del fruto de tus obras se satura la tierra; la hierba haces brotar para el ganado, y las plantas para el uso del hombre, para que saque de la tierra el pan, y el vino que recrea el corazón del hombre, para que lustre su rostro con aceite y el pan conforte el corazón del hombre. Se empapan bien los árboles de Yahvéh, los cedros del Líbano que él plantó; allí ponen los pájaros su nido, su casa en su copa la cigüeña; los altos montes, para los rebecos, para los damanes, el cobijo de las rocas. Hizo la luna para marcar los tiempos, conoce el sol su ocaso; mandas tú las tinieblas, y es la noche, en ella rebullen todos los animales de la selva, los leoncillos rugen por la presa, y su alimento a Dios reclaman. Cuando el sol sale, se recogen, y van a echarse a sus guaridas; el hombre sale a su trabajo, para hacer su faena hasta la tarde. ¡Cuán numerosas tus obras, Yahvéh! Todas las has hecho con sabiduría, de tus criaturas está llena la tierra. Ahí está el mar, grande y de amplios brazos, y en él el hervidero innumerable de animales, grandes y pequeños; por allí circulan los navíos, y Leviatán que tú formaste para jugar con él. Todos ellos de ti están esperando que les des a su tiempo su alimento; tú se lo das y ellos lo toman, abres tu mano y se sacian de bienes. Escondes tu rostro y se anonadan, les retiras su soplo, y expiran y a su polvo retornan. Envías tu soplo y son creados, y renuevas la faz de la tierra. ¡Sea por siempre la gloria de Yahvéh, en sus obras Yahvéh se regocije! El que mira a la tierra y ella tiembla, toca los montes y echan humo. A Yahvéh mientras viva he de cantar, mientras exista salmodiaré para mi Dios. ¡Oh, que mi poema le complazca! Yo en Yahvéh tengo mi gozo. ¡Que se acaben los pecadores en la tierra, y ya no más existan los impíos! ¡Bendice a Yahvéh, alma mía!

Salmos 105
¡Aleluya! ¡Dad gracias a Yahvéh, aclamad su nombre, divulgad entre los pueblos sus hazañas! ¡Cantadle, salmodiad para él, sus maravillas todas recitad; gloriaos en su santo nombre, se alegre el corazón de los que buscan a Yahvéh! ¡Buscad a Yahvéh y su fuerza, id tras su rostro sin descanso, recordad las maravillas que él ha hecho, sus prodigios y los juicios de su boca! Raza de Abraham, su servidor, hijos de Jacob, su elegido: él, Yahvéh, es nuestro Dios, por toda la tierra sus juicios. Él se acuerda por siempre de su alianza, palabra que impuso a mil generaciones, lo que pactó con Abraham, el juramento que hizo a Isaac, y que puso a Jacob como precepto, a Israel como alianza eterna, diciendo: «Yo te daré la tierra de Canaán por parte de vuestra herencia». Aunque ellos eran poco numerosos, gente de paso y forasteros allí, cuando iban de nación en nación, desde un reino a otro pueblo, a nadie permitió oprimirles, por ellos castigó a los reyes: «Guardaos de tocar a mis ungidos, ni mal alguno hagáis a mis profetas.» Llamó al hambre sobre aquel país, todo bastón de pan rompió; delante de ellos envió a un hombre, José, vendido como esclavo. Sus pies vejaron con grilletes, por su cuello pasaron las cadenas, hasta que se cumplió su predicción, y le acreditó la palabra de Yahvéh. El rey mandó a soltarle, el soberano de pueblos, a dejarle libre; le erigió señor sobre su casa, y de toda su hacienda soberano, para instruir a su gusto a sus magnates, y a sus ancianos hacer sabios. Entonces Israel entró en Egipto, Jacob residió en el país de Cam. Él aumentó a su pueblo en gran manera, le hizo más fuerte que sus adversarios; cambió el corazón de estos para que odiasen a su pueblo y a sus siervos pusieran asechanzas. Luego envió a Moisés su servidor, y Aarón, su escogido, que hicieron entre ellos sus señales anunciadas, prodigios en el país de Cam. Mandó tinieblas y tinieblas hubo, más ellos desafiaron sus palabras. Trocó en sangre sus aguas y a sus peces dio muerte. Pululó de ranas su país, hasta en las moradas de sus reyes; mandó él, y vinieron los mosquitos, los cínifes por toda su comarca. Les dio por lluvia el granizo, llamas de fuego en su país; hirió sus viñedos, sus higueras, y los árboles quebró de su comarca. Dio la orden, y llegó la langosta, y el pulgón en número incontable; comieron toda hierba en su país, comieron el fruto de su suelo. E hirió en su país a todo primogénito, las primicias de todo su vigor; y a ellos los sacó con plata y oro, ni uno solo flaqueó de entre sus tribus. Egipto se alegró de su salida, pues era presa del terror. Él desplegó una nube por cubierta, y un fuego para alumbrar de noche. Pidieron, y trajo codornices, de pan de los cielos los hartó; abrió la roca, y brotaron las aguas, como río corrieron por los sequedales. Recordando su palabra sagrada dada a Abraham su servidor, sacó a su pueblo en alborozo, a sus elegidos entre gritos de júbilo. Y las tierras les dio de las naciones, el trabajo de las gentes heredaron, a fin de que guarden sus preceptos y sus leyes observen.

Salmos 106
Aleluya. ¡Dad gracias a Yahvéh, porque es bueno, porque es eterno su amor! ¿Quién dirá las proezas de Yahvéh, hará oír toda su alabanza? ¡Dichosos los que guardan el derecho, los que practican en todo tiempo la justicia! ¡Acuérdate de mí, Yahvéh, por amor de tu pueblo; con tu salvación visítame, que vea yo la dicha de tus elegidos, me alegre en la alegría de tu pueblo, con tu heredad me felicite! Hemos pecado como nuestros padres, hemos faltado, nos hemos hecho impíos; nuestros padres, en Egipto, no comprendieron tus prodigios. No se acordaron de tu inmenso amor, se rebelaron contra el Altísimo junto al mar de Suf. Él los salvó por amor de su nombre, para dar a conocer su poderío. Increpó al mar de Suf y este se secó, los llevó por los abismos como por un desierto, los salvó de la mano del que odiaba, de la mano del enemigo los libró. El agua cubrió a sus adversarios, ni uno solo quedó. Entonces ellos tuvieron fe en sus palabras y sus laudes cantaron. Más pronto se olvidaron de sus obras, no tuvieron en cuenta su consejo; en el desierto ardían de avidez, a Dios tentaban en la estepa. Él les concedió lo que pedían, mandó fiebre a sus almas. Y en el campamento, de Moisés tuvieron celos, de Aarón, el santo de Yahvéh. Se abre la tierra, traga a Datán, y cubre a la cuadrilla de Abirón; un fuego se enciende contra su cuadrilla, una llama abrasa a los impíos. En Horeb se fabricaron un becerro, se postraron ante un metal fundido, y cambiaron su gloria por la imagen de un buey que come heno. Olvidaban a Dios que les salvaba, al autor de cosas grandes en Egipto, de prodigios en el país de Cam, de portentos en el mar de Suf. Hablaba ya de exterminarlos, si no es porque Moisés, su elegido, se mantuvo en la brecha en su presencia, para apartar su furor de destruirlos. Una tierra de delicias desdeñaron, en su palabra no tuvieron fe; murmuraron dentro de sus tiendas, no escucharon la voz de Yahvéh. Y él, mano en alto, les juró hacerles caer en el desierto, desperdigar su raza entre las naciones, y dispersarlos por los países. Luego se vincularon a Baal Peor y comieron sacrificios de muertos. Así le irritaron con sus obras, y una plaga descargó sobre ellos. Entonces surgió Pinjás, zanjó, y la plaga se detuvo; esto se le contó como justicia de edad en edad, para siempre. En las aguas de Meribá le enojaron, y mal le fue a Moisés por culpa de ellos, pues le amargaron el espíritu, y habló a la ligera con sus labios. No exterminaron a los pueblos que Yahvéh les había señalado, sino que se mezclaron con las gentes, aprendieron sus prácticas. Sirvieron a sus ídolos que fueron un lazo para ellos; sacrificaban sus hijos y sus hijas a demonios. Sangre inocente derramaban, la sangre de sus hijos y sus hijas, que inmolaban a los ídolos de Canaán, y fue el país profanado de sangre. Así se manchaban con sus obras, y se prostituían con sus prácticas. Entonces se inflamó la cólera de Yahvéh contra su pueblo, y abominó de su heredad. Los entregó en mano de las gentes, y los dominaron los que los odiaban; sus enemigos los tiranizaron, bajo su mano quedaron humillados. Muchas veces los libró aunque ellos, en su propósito obstinados, se hundían en su culpa; y los miró cuando estaban en apuros, escuchando su clamor. Se acordó en favor de ellos de su alianza, se enterneció según su inmenso amor; hizo que de ellos se apiadaran aquellos que cautivos los tenían. ¡Sálvanos, Yahvéh, Dios nuestro, reúnenos de entre las naciones, para dar gracias a tu nombre santo, y gloriarnos en tu alabanza! ¡Bendito sea Yahvéh, Dios de Israel, por eternidad de eternidades! Y el pueblo todo diga: ¡Amén!

Salmos 107
Dad gracias a Yahvéh, porque es bueno, porque es eterno su amor. Que lo digan los redimidos de Yahvéh, los que él ha redimido del poder del adversario, los que ha reunido de entre los países, de oriente y de poniente, del norte y mediodía. En el desierto erraban, por la estepa, no encontraban camino de ciudad habitada; hambrientos, y sedientos, desfallecía en ellos su alma. Y hacia Yahvéh gritaron en su apuro, y él los libró de sus angustias, les condujo por camino recto, hasta llegar a ciudad habitada. ¡Den gracias a Yahvéh por su amor, por sus prodigios con los hijos de Adán! Porque él sació el alma anhelante, el alma hambrienta saturó de bienes. Habitantes de tiniebla y sombra, cautivos de la miseria y de los hierros, por haber sido rebeldes a las órdenes de Dios y haber despreciado el consejo del Altísimo, él sometió su corazón a la fatiga, sucumbían, y no había quien socorriera. Y hacia Yahvéh gritaron en su apuro, y él los salvó de sus angustias, los sacó de la tiniebla y de la sombra, y rompió sus cadenas. ¡Den gracias a Yahvéh por su amor, por sus prodigios con los hijos de Adán! Pues las puertas de bronce quebrantó, y los barrotes de hierro hizo pedazos. Embotados de resultas de sus yerros, miserables a causa de sus culpas, todo manjar les daba náusea, tocaban ya a las puertas de la muerte. Y hacia Yahvéh gritaron en su apuro, y él los salvó de sus angustias; su palabra envió para sanarlos y arrancar sus vidas de la fosa. ¡Den gracias a Yahvéh por su amor, por sus prodigios con los hijos de Adán! Ofrezcan sacrificios de acción de gracias, y sus obras pregonen con gritos de alegría. Los que a la mar se hicieron en sus naves, llevando su negocio por las muchas aguas, vieron las obras de Yahvéh, sus maravillas en el piélago. Dijo, y suscitó un viento de borrasca, que entumeció las olas; subiendo hasta los cielos, bajando hasta el abismo, bajo el peso del mal su alma se hundía; dando vuelcos, vacilando como un ebrio, tragada estaba toda su pericia. Y hacia Yahvéh gritaron en su apuro, y él los sacó de sus angustias; a silencio redujo la borrasca, y las olas callaron. Se alegraron de verlas amansarse, y él los llevó hasta el puerto deseado. ¡Den gracias a Yahvéh por su amor, por sus prodigios con los hijos de Adán! ¡Ensálcenle en la asamblea del pueblo, en el concejo de los ancianos le celebren! Él cambia los ríos en desierto, y en suelo de sed los manantiales, la tierra fértil en salinas, por la malicia de sus habitantes. Y él cambia el desierto en un estanque, y la árida tierra en manantial. Allí asienta a los hambrientos, y ellos fundan una ciudad habitada. Y siembran campos, plantan viñas, que producen sus frutos de cosecha. Él los bendice y crecen mucho y no deja que mengüen sus ganados. Menguados estaban, y abatidos por la tenaza del mal y la aflicción. El que vierte desprecio sobre príncipes, los hacía errar por caos sin camino. Más él recobra de la miseria al pobre, aumenta como un rebaño las familias; los hombres rectos lo ven y se recrean, y toda iniquidad cierra su boca. ¿Hay algún sabio? ¡Que guarde estas cosas, y comprenda el amor de Yahvéh!

Salmos 108
Cántico. Salmo. De David. A punto está mi corazón, oh Dios, voy a cantar, voy a salmodiar, ¡despertad, arpa y cítara! ¡a la aurora he de despertar! Te alabaré entre los pueblos, Yahvéh, te salmodiaré entre las gentes, porque tu amor es grande hasta los cielos, tu lealtad hasta las nubes. ¡Álzate, oh Dios, sobre los cielos, sobre toda la tierra, tu gloria! Para que tus amados salgan libres, ¡salva con tu diestra, respóndenos! Ha hablado Dios en su santuario: «Ya exulto, voy a repartir a Siquem, a medir el valle de Sukkot. «Mío es Galaad, mío Manasés, Efraím, yelmo de mi cabeza, Judá mi cetro. «Moab, la vasija en que me lavo. Sobre Edom tiro mi sandalia, contra Filistea lanzo el grito de guerra.» ¿Quién me conducirá hasta la plaza fuerte, quién me guiará hasta Edom? ¿No eres tú, oh Dios, que nos has rechazado y ya no sales, oh Dios, con nuestras tropas? ¡Danos ayuda contra el adversario, que es vano el socorro del hombre! ¡Con Dios hemos de hacer proezas, y él hollará a nuestros adversarios!

Salmos 109
Del maestro de coro. De David. Salmo. ¡Oh Dios de mi alabanza, no te quedes mudo! Boca de impío, boca de engaño, se abren contra mí. Me hablan con lengua de mentira, con palabras de odio me envuelven, me atacan sin razón. En pago de mi amor, se me acusa, y yo soy solo oración; se me devuelve mal por bien y odio por mi amor: «¡Suscita a un impío contra él, y que un fiscal esté a su diestra; que en el juicio resulte culpable, y su oración sea tenida por pecado! «¡Sean pocos sus días, que otro ocupe su cargo; queden sus hijos huérfanos y viuda su mujer! «¡Anden sus hijos errantes, mendigando, y sean expulsados de sus ruinas; el acreedor le atrape todo lo que tiene, y saqueen su fruto los extraños! «¡Ni uno solo tenga con él amor, nadie se compadezca de sus huérfanos, sea dada al exterminio su posteridad, en una generación sea borrado su nombre! «¡Sea ante Yahvéh recordada la culpa de sus padres, el pecado de su madre no se borre; estén ante Yahvéh constantemente, y él cercene de la tierra su memoria!» Porque él no se acordó de actuar con amor: persiguió al pobre, al desdichado, y al de abatido corazón para matarle; amó la maldición: sobre él recaiga, no quiso bendición: que de él se aleje. Se vistió de maldición como de un manto: ¡que penetre en su seno como agua, igual que aceite dentro de sus huesos! ¡Séale cual vestido que le cubra, como cinto que la ciña siempre! ¡Tal sea de parte de Yahvéh la paga de mis acusadores, de los que dicen mal contra mi alma! ¡Y tú, Señor Yahvéh, actúa por mí en gracia de tu nombre, porque tu amor es bueno, líbrame!, Porque soy pobre y desdichado, y tengo dentro herido el corazón; cual sombra que declina me voy yendo, me han sacudido igual que a la langosta. Por tanto ayuno se doblan mis rodillas, falta de aceite mi carne ha enflaquecido; me he hecho el insulto de ellos, me ven y menean su cabeza. ¡Ayúdame, Yahvéh, Dios mío, sálvame por tu amor! ¡Sepan ellos que tu mano es esta, que tú, Yahvéh, lo has hecho! ¡Maldigan ellos, pero tú bendice, los que me atacan sean confundidos y tu siervo se alegre! ¡Los que me acusan queden vestidos de ignominia, como en un manto en su vergüenza envueltos! ¡Copiosas gracias a Yahvéh en mi boca, entre la multitud le alabaré: porque él se pone a la diestra del pobre para salvar su alma de sus jueces!

Salmos 110
De David. Salmo. Oráculo de Yahvéh a mi Señor: «Siéntate a mi diestra, hasta que ponga a tus enemigos por escabel de tus pies.» El cetro de tu poder lo extenderá Yahvéh desde Sión: ¡domina en medio de tus enemigos! Para ti el principado el día de tu nacimiento, en esplendor sagrado desde el seno, desde la aurora de tu juventud. Lo ha jurado Yahvéh y no ha de retractarse: «Tú eres por siempre sacerdote, según el orden de Melquisedec.» A tu diestra, Señor, él quebranta a los reyes el día de su cólera; sentencia a las naciones, amontona cadáveres, cabezas quebranta sobre la ancha tierra. En el camino bebe del torrente, por eso levanta la cabeza.

Salmos 111
Aleluya. Doy gracias a Yahvéh de todo corazón, en el consejo de los justos y en la comunidad. Grandes son las obras de Yahvéh, meditadas por los que en ellas se complacen. Esplendor y majestad su obra, su justicia por siempre permanece. De sus maravillas ha dejado un memorial. ¡Clemente y compasivo Yahvéh! Ha dado alimento a quienes le temen, se acuerda por siempre de su alianza. Ha revelado a su pueblo el poder de sus obras, dándole la heredad de las naciones. Verdad y justicia, las obras de sus manos, leales todas sus ordenanzas, afirmadas para siempre jamás, ejecutadas con verdad y rectitud. Ha enviado redención a su pueblo, ha fijado para siempre su alianza; santo y temible es su nombre. Principio del saber, el temor de Yahvéh; muy cuerdos todos los que lo practican. Su alabanza por siempre permanece.

Salmos 112
Aleluya. ¡Dichoso el hombre que teme a Yahvéh, que en sus mandamientos mucho se complace! Fuerte será en la tierra su estirpe, bendita la raza de los hombres rectos. Hacienda y riquezas en su casa, su justicia por siempre permanece. En las tinieblas brilla, como luz de los rectos, tierno, clemente y justo. Feliz el hombre que se apiada y presta, y arregla rectamente sus asuntos. No, no será conmovido jamás, en memoria eterna permanece el justo; no tiene que temer noticias malas, firme es su corazón, en Yahvéh confiado. Seguro está su corazón, no teme: al fin desafiará a sus adversarios. Con largueza da a los pobres; su justicia por siempre permanece, su frente se levanta con honor. Lo ve el impío y se enfurece, rechinando sus dientes, se consume. El afán de los impíos se pierde.

Salmos 113
Aleluya. Alabad, siervos de Yahvéh, alabad el nombre de Yahvéh; ¡Bendito sea el nombre de Yahvéh, desde ahora y por siempre! ¡De la salida del sol hasta su ocaso, sea loado el nombre de Yahvéh! ¡Excelso sobre todas las naciones Yahvéh, por encima de los cielos su gloria! ¿Quién como Yahvéh, nuestro Dios, que se sienta en las alturas, y se abaja para ver los cielos y la tierra? Él levanta del polvo al desvalido, del estiércol hace subir al pobre, para sentarle con los príncipes, con los príncipes de su pueblo. Él asienta a la estéril en su casa, madre de hijos jubilosa.

Salmos 114
Cuando Israel salió de Egipto, la casa de Jacob de un pueblo bárbaro, se hizo Judá su santuario, Israel su dominio. Lo vio la mar y huyó, retrocedió el Jordán, los montes brincaron lo mismo que carneros, las colinas como corderillos. Mar, ¿qué es lo que tienes para huir, y tú, Jordán, para retroceder, montes, para saltar como carneros, colinas, como corderillos? ¡Tiembla, tierra, ante la faz del Dueño, ante la faz del Dios de Jacob, aquel que cambia la peña en un estanque, y el pedernal en una fuente!

Salmos 115
¡No a nosotros, Yahvéh, no a nosotros, sino a tu nombre da la gloria, por tu amor, por tu verdad! ¿Por qué han de decir las gentes: «¿Dónde está su Dios?» Nuestro Dios está en los cielos, todo cuanto le place lo realiza. Plata y oro son sus ídolos, obra de mano de hombre. Tienen boca y no hablan, tienen ojos y no ven, tienen oídos y no oyen, tienen nariz y no huelen. Tienen manos y no palpan, tienen pies y no caminan, ni un solo susurro en su garganta. Como ellos serán los que los hacen, cuantos en ellos ponen su confianza. Casa de Israel, confía en Yahvéh, él, su auxilio y su escudo; casa de Aarón, confía en Yahvéh, él, su auxilio y su escudo; los que teméis a Yahvéh, confiad en Yahvéh, él, su auxilio y su escudo. Yahvéh se acuerda de nosotros, él bendecirá, bendecirá a la casa de Israel, bendecirá a la casa de Aarón, bendecirá a los que temen a Yahvéh, a pequeños y grandes. ¡Yahvéh os acreciente a vosotros y a vuestros hijos! ¡Benditos vosotros de Yahvéh, que ha hecho los cielos y la tierra! Los cielos, son los cielos de Yahvéh, la tierra, se la ha dado a los hijos de Adán. No alaban los muertos a Yahvéh, ni ninguno de los que bajan al Silencio; más nosotros, los vivos, a Yahvéh bendecimos, desde ahora y por siempre.

Salmos 116
Aleluya. Yo amo, porque Yahvéh escucha mi voz suplicante; porque hacia mí su oído inclina el día en que clamo. Los lazos de la muerte me aferraban, me sorprendieron las redes del seol; en angustia y tristeza me encontraba, y el nombre de Yahvéh invoqué: ¡Ah, Yahvéh, salva mi alma! Tierno es Yahvéh y justo, compasivo nuestro Dios; Yahvéh guarda a los pequeños, estaba yo postrado y me salvó. Vuelve, alma mía, a tu reposo, porque Yahvéh te ha hecho bien. Ha guardado mi alma de la muerte, mis ojos de las lágrimas, y mis pies de mal paso. Caminaré en la presencia de Yahvéh por la tierra de los vivos. ¡Tengo fe, aún cuando digo: «Muy desdichado soy»!, yo que he dicho en mi consternación: «Todo hombre es mentiroso». ¿Cómo a Yahvéh podré pagar todo el bien que me ha hecho? La copa de salvación levantaré, e invocaré el nombre de Yahvéh. Cumpliré mis votos a Yahvéh, ¡sí, en presencia de todo su pueblo! Mucho cuesta a los ojos de Yahvéh la muerte de los que le aman. ¡Ah, Yahvéh, yo soy tu siervo, tu siervo, el hijo de tu esclava, tú has soltado mis cadenas! Sacrificio te ofreceré de acción de gracias, e invocaré el nombre de Yahvéh. Cumpliré mis votos a Yahvéh, sí, en presencia de todo su pueblo, en los atrios de la Casa de Yahvéh, en medio de ti, Jerusalén.

Salmos 117
¡Alabad a Yahvéh, todas las naciones, celebradle, pueblos todos! Porque es fuerte su amor hacia nosotros, la verdad de Yahvéh dura por siempre.

Salmos 118
¡Dad gracias a Yahvéh, porque es bueno, porque es eterno su amor! ¡Diga la casa de Israel: que es eterno su amor! ¡Diga la casa de Aarón: que es eterno su amor! ¡Digan los que temen a Yahvéh: que es eterno su amor! En mi angustia hacia Yahvéh grité, él me respondió y me dio respiro; Yahvéh está por mí, no tengo miedo, ¿qué puede hacerme el hombre? Yahvéh está por mí, entre los que me ayudan, y yo desafío a los que me odian. Mejor es refugiarse en Yahvéh que confiar en hombre; mejor es refugiarse en Yahvéh que confiar en magnates. Me rodeaban todos los gentiles: en el nombre de Yahvéh los cercené; me rodeaban, me asediaban: en el nombre de Yahvéh los cercené. Me rodeaban como avispas, llameaban como fuego de zarzas: en el nombre de Yahvéh los cercené. Se me empujó, se me empujó para abatirme, pero Yahvéh vino en mi ayuda; mi fuerza y mi cántico es Yahvéh, él ha sido para mí la salvación. Clamor de júbilo y salvación, en las tiendas de los justos: «¡La diestra de Yahvéh hace proezas, excelsa la diestra de Yahvéh, la diestra de Yahvéh hace proezas!» No, no he de morir, que viviré, y contaré las obras de Yahvéh; me castigó, me castigó Yahvéh, pero a la muerte no me entregó. ¡Abridme las puertas de justicia, entraré por ellas, daré gracias a Yahvéh! Aquí está la puerta de Yahvéh, por ella entran los justos. Gracias te doy, porque me has respondido, y has sido para mí la salvación. La piedra que los constructores desecharon en piedra angular se ha convertido; esta ha sido la obra de Yahvéh, una maravilla a nuestros ojos. ¡Este es el día que Yahvéh ha hecho, exultemos y gocémonos en él! ¡Ah, Yahvéh, da la salvación! ¡Ah, Yahvéh, da el éxito! ¡Bendito el que viene en el nombre de Yahvéh! Desde la Casa de Yahvéh os bendecimos. Yahvéh es Dios, él nos ilumina. ¡Cerrad la procesión, ramos en mano, hasta los cuernos del altar! Tú eres mi Dios, yo te doy gracias, Dios mío, yo te exalto. ¡Dad gracias a Yahvéh, porque es bueno, porque es eterno su amor!

Salmos 119
Alef. Dichosos los que van por camino perfecto, los que proceden en la ley de Yahvéh. Dichosos los que guardan sus dictámenes, los que le buscan de todo corazón, y los que, sin cometer iniquidad, andan por sus caminos. Tú tus ordenanzas promulgaste, para que sean guardadas cabalmente. ¡Ojalá mis caminos se aseguren para observar tus preceptos! Entonces no tendré vergüenza alguna al mirar a todos tus mandamientos. Con rectitud de corazón te daré gracias, al aprender tus justos juicios. Tus preceptos, los observaré, no me abandones tú del todo. Bet. ¿Cómo el joven guardará puro su camino? Observando tu palabra. De todo corazón ando buscándote, no me desvíes de tus mandamientos. Dentro del corazón he guardado tu promesa, para no pecar contra ti. Bendito tú, Yahvéh, enséñame tus preceptos. Con mis labios he contado todos los juicios de tu boca. En el camino de tus dictámenes me recreo más que en toda riqueza. En tus ordenanzas quiero meditar y mirar a tus caminos. En tus preceptos tengo mis delicias, no olvido tu palabra. Guímel. Haz merced a tu siervo y viviré. y guardaré tu palabra. Abre mis ojos para que contemple las maravillas de tu ley. Un forastero soy sobre la tierra, tus mandamientos no me ocultes. Mi alma se consume deseando tus juicios en todo tiempo. Tú increpas a los soberbios, los malditos, que se desvían de tus mandamientos. Echa lejos de mí oprobio y menosprecio, porque he guardado tus dictámenes. Aunque los príncipes hablen en sesión contra mí, tu servidor medita en tus preceptos. Tus dictámenes hacen mis delicias, mis consejeros, tus preceptos. Dálet. Mi alma está pegada al polvo, hazme vivir conforme a tu palabra. Mis caminos expuse, y tú me respondiste, enséñame tus preceptos. Hazme entender el camino de tus ordenanzas, y meditaré en tus maravillas. Se va en lágrimas mi alma por el tedio, sosténme conforme a tu palabra. Aléjame del camino de mentira, y dame la gracia de tu ley, He escogido el camino de la lealtad, a tus juicios me conformo. A tus dictámenes me mantengo adherido, no me confundas, tú, Yahvéh. Corro por el camino de tus mandamientos, pues tú mi corazón dilatas. He. Enséñame, Yahvéh, el camino de tus preceptos, yo lo quiero guardar en recompensa. Hazme entender, para guardar tu ley y observarla de todo corazón. Llévame por la senda de tus mandamientos porque mi complacencia tengo en ella. Inclina mi corazón hacia tus dictámenes, y no a ganancia injusta. Aparta mis ojos de mirar vanidades, por tu palabra vivifícame. Mantén a tu siervo tu promesa, que conduce a tu temor. Aparta de mí el oprobio que me espanta, pues son buenos tus juicios. Mira que deseo tus ordenanzas, hazme vivir por tu justicia. Vau. ¡Llegue hasta mí tu amor, Yahvéh, tu salvación, conforme a tu promesa! Y daré respuesta al que me insulta, porque confío en tu palabra. No quites de mi boca la palabra de verdad, porque espero en tus juicios. Yo observaré sin descanso tu ley para siempre jamás. Y andaré por camino anchuroso, porque tus ordenanzas voy buscando. De tus dictámenes hablaré ante los reyes, y no tendré que avergonzarme. Y me deleitaré en tus mandamientos, que amo mucho. Tiendo mis manos hacia tus mandamientos, en tus preceptos medito. Zain. Recuerda la palabra dada a tu servidor, de la que has hecho mi esperanza. Este es mi consuelo en mi miseria: que tu promesa me da vida. Los soberbios me insultan hasta el colmo, yo no me aparto de tu ley. Me acuerdo de tus juicios de otro tiempo, oh Yahvéh, y me consuelo. Me arrebata el furor por los impíos que abandonan tu ley. Tus preceptos son cantares para mí en mi mansión de forastero. Me acuerdo por la noche de tu nombre, Yahvéh, quiero guardar tu ley. Esta es mi tarea: guardar tus ordenanzas. Jet. Mi porción, Yahvéh, he dicho, es guardar tus palabras. Con todo el corazón busco tu favor, tenme piedad conforme a tu promesa. He examinado mis caminos y quiero volver mis pies a tus dictámenes. Me doy prisa y no me tardo en observar tus mandamientos. Las redes de los impíos me aprisionan, yo no olvido tu ley. Me levanto a medianoche a darte gracias por tus justos juicios. Amigo soy de todos los que te temen y observan tus ordenanzas. De tu amor, Yahvéh, está la tierra llena, enséñame tus preceptos. Tet. Has sido generoso con tu siervo, oh Yahvéh, conforme a tu palabra. Cordura y sabiduría enséñame, pues tengo fe en tus mandamientos. Antes de ser humillado, me descarriaba, más ahora observo tu promesa. Tú, que eres bueno y bienhechor, enséñame tus preceptos. Los soberbios me enredan con mentira, yo guardo tus ordenanzas de todo corazón. Como de grasa su corazón está embotado, más yo en tu ley tengo mis delicias. Un bien para mí ser humillado, para que aprenda tus preceptos. Un bien para mí la ley de tu boca, más que miles de oro y plata. Yod. Tus manos me han hecho y me han formado, hazme entender, y aprenderé tus mandamientos. Los que te temen me ven con alegría, porque espero en tu palabra. Yo sé, Yahvéh, que son justos tus juicios, que con lealtad me humillas tú. Sea tu amor consuelo para mí, según tu promesa a tu servidor. Me alcancen tus ternuras y viviré, porque tu ley es mi delicia. Sean confundidos los soberbios que me afligen con mentira, yo en tus ordenanzas medito. Vuélvanse hacia mí los que te temen, los que conocen tus dictámenes. Sea mi corazón perfecto en tus preceptos, para que no sea confundido. Kaf. En pos de tu salvación mi alma languidece, en tu palabra espero. Languidecen mis ojos en pos de tu promesa diciendo: «¿Cuándo vas a consolarme?» Aun hecho igual que un pellejo que se ahúma, de tus preceptos no me olvido. ¿Cuántos serán los días de tu siervo? ¿cuándo harás justicia de mis perseguidores? Los soberbios han cavado fosas para mí en contra de tu ley. Todos tus mandamientos son verdad, con mentira se me persigue, ¡ayúdame! Poco falta para que me borren de la tierra, más yo tus ordenanzas no abandono. Según tu amor dame la vida, y guardaré el dictamen de tu boca. Lámed. Para siempre, Yahvéh, tu palabra, firme está en los cielos. Por todas las edades tu verdad, tú fijaste la tierra, ella persiste. Por tus juicios subsiste todo hasta este día, pues toda cosa es sierva tuya. Si tu ley no hubiera sido mi delicia, ya habría perecido en mi miseria. Jamás olvidaré tus ordenanzas, por ellas tú me das la vida. Tuyo soy, sálvame, pues tus ordenanzas voy buscando. Para perderme me acechan los impíos, yo estoy atento a tus dictámenes. De todo lo perfecto he visto el límite: ¡Qué inmenso es tu mandamiento! Mem. ¡Oh, cuánto amo tu ley! Todo el día es ella mi meditación. Más sabio me haces que mis enemigos por tu mandamiento, que por siempre es mío. Tengo más prudencia que todos mis maestros, porque mi meditación son tus dictámenes. Poseo más cordura que los viejos, porque guardo tus ordenanzas. Retraigo mis pasos de toda mala senda para guardar tu palabra. De tus juicios no me aparto, porque me instruyes tú. ¡Cuán dulce al paladar me es tu promesa, más que miel a mi boca! Por tus ordenanzas cobro inteligencia, por eso odio toda senda de mentira. Nun. Para mis pies antorcha es tu palabra, luz para mi sendero. He jurado, y he de mantenerlo, guardar tus justos juicios. Humillado en exceso estoy, Yahvéh, dame la vida conforme a tu palabra. Acepta los votos de mi boca, Yahvéh, y enséñame tus juicios. Mi alma está en mis manos sin cesar, más no olvido tu ley. Me tienden un lazo los impíos, más yo no me desvío de tus ordenanzas. Tus dictámenes son mi herencia por siempre, ellos son la alegría de mi corazón. Inclino mi corazón a practicar tus preceptos, recompensa por siempre. Sámek. Aborrezco la doblez y amo tu ley. Mi refugio y mi escudo eres tú, yo espero en tu palabra. ¡Apartaos de mí, malvados, quiero guardar los mandamientos de mi Dios! Sosténme conforme a tu promesa, y viviré, no defraudes mi esperanza. Sé tú mi apoyo, y seré salvo, y sin cesar tendré a la vista tus preceptos. Tú deshaces a todos los que se desvían de tus preceptos, mentira es su astucia. Tienes por escoria a todos los impíos de la tierra, por eso amo yo tus dictámenes. Por tu terror tiembla mi carne, de tus juicios tengo miedo. Ain. Juicio y justicia he practicado, a mis opresores no me entregues. Sé fiador de tu siervo para el bien, no me opriman los soberbios. En pos de tu salvación languidecen mis ojos, tras tu promesa de justicia. Según tu amor trata a tu siervo, enséñame tus preceptos. Yo soy tu servidor, hazme entender, y aprenderé tus dictámenes. Ya es hora de actuar, Yahvéh, se ha violado tu ley. Por eso amo yo tus mandamientos más que el oro, más que el oro fino. Por eso me guío por todas tus ordenanzas y odio toda senda de mentira. Pe. Maravillas son tus dictámenes, por eso mi alma los guarda. Al abrirse, tus palabras iluminan dando inteligencia a los sencillos. Abro mi boca franca, y hondo aspiro, que estoy ansioso de tus mandamientos. Vuélvete a mí y tenme piedad, como es justo para los que aman tu nombre. Mis pasos asegura en tu promesa, que no me domine ningún mal. Rescátame de la opresión del hombre, y tus ordenanzas guardaré. Haz que brille tu faz para tu siervo, y enséñame tus preceptos. Mis ojos destilan ríos de lágrimas, porque tu ley no se guarda. Sade. ¡Justo eres tú, Yahvéh, y rectitud tus juicios! Con justicia impones tus dictámenes, con colmada verdad. Mi celo me consume, porque mis adversarios olvidan tus palabras. Acendrada en extremo es tu promesa, tu servidor la ama. Pequeño soy y despreciado, más no olvido tus ordenanzas. Justicia eterna es tu justicia, verdad tu ley. Angustia y opresión me han alcanzado, tus mandamientos hacen mis delicias. Justicia eterna tus dictámenes, hazme entender para que viva. Qof. Invoco con todo el corazón, respóndeme, Yahvéh, y guardaré tus preceptos. Yo te invoco, sálvame, y guardaré tus dictámenes. Me adelanto a la aurora y pido auxilio, en tu palabra espero. Mis ojos se adelantan a las vigilias de la noche, a fin de meditar en tu promesa. Por tu amor, Yahvéh, escucha mi voz, por tus juicios, vivifícame. Se acercan a la infamia los que me persiguen, se alejan de tu ley. Tú estás cerca, Yahvéh, todos tus mandamientos son verdad. De tus dictámenes sé desde hace tiempo que para siempre los fundaste. Res. Mira mi aflicción y líbrame, porque tu ley no olvido. Aboga por mi causa tú, rescátame, dame la vida conforme a tu promesa. Lejos de los impíos la salvación, pues no van buscando tus preceptos. Muchas son tus ternuras, Yahvéh, por tus juicios, vivifícame. Numerosos mis perseguidores y adversarios, yo no me aparto de tus dictámenes. He visto a los traidores, me disgusta que no guarden tu promesa. Mira que amo tus ordenanzas, Yahvéh, dame la vida por tu amor. Es verdad el principio de tu palabra, por siempre, todos tus justos juicios. Sin. Príncipes me persiguen sin razón, más mi corazón teme tus palabras. Me regocijo en tu promesa como quien halla un gran botín. La mentira detesto y abomino, amo tu ley. Siete veces al día te alabo por tus justos juicios. Mucha es la paz de los que aman tu ley, no hay tropiezo para ellos. Espero tu salvación, Yahvéh, tus mandamientos cumplo. Mi alma guarda tus dictámenes, mucho los amo. Guardo tus ordenanzas y dictámenes que ante ti están todos mis caminos. Tau. Mi grito llegue hasta tu faz, Yahvéh, por tu palabra dame inteligencia. Mi súplica llegue ante tu rostro, por tu promesa líbrame. Mis labios proclaman tu alabanza, pues tú me enseñas tus preceptos. Mi lengua repita tu promesa, pues todos tus mandamientos son justicia. Venga tu mano en mi socorro, porque tus ordenanzas he escogido. Anhelo tu salvación, Yahvéh, tu ley hace mis delicias. Viva mi alma para alabarte, y ayúdenme tus juicios. Me he descarriado como oveja perdida: ven en busca de tu siervo. No, no me olvido de tus mandamientos.

Salmos 120
Canción de las subidas. En mi angustia a Yahvéh grité, y él me respondió. ¡Yahvéh, libra mi alma del labio mentiroso, de la lengua tramposa! ¿Qué te dará y qué te añadirá, lengua tramposa? ¡Flechas de guerrero afiladas con brasas de retama! ¡Qué desgracia para mí vivir en Mések, morar en las tiendas de Quedar! Harto ha vivido ya mi alma con los que odian la paz. Que si yo hablo de paz, ellos prefieren guerra.

Salmos 121
Canción de las subidas. Alzo mis ojos a los montes: ¿de dónde vendrá mi auxilio? Mi auxilio me viene de Yahvéh, que hizo el cielo y la tierra. ¡No deje él titubear tu pie! ¡no duerme tu guardián! No, no duerme ni dormita el guardián de Israel. Yahvéh es tu guardián, tu sombra, Yahvéh, a tu diestra. De día el sol no te hará daño, ni la luna de noche. Te guarda Yahvéh de todo mal, él guarda tu alma; Yahvéh guarda tus salidas y entradas, desde ahora y por siempre.

Salmos 122
Canción de las subidas. De David. ¡Oh, qué alegría cuando me dijeron: Vamos a la Casa de Yahvéh! ¡Ya estamos, ya se posan nuestros pies en tus puertas, Jerusalén! Jerusalén, construida cual ciudad de compacta armonía, a donde suben las tribus, las tribus de Yahvéh, es para Israel el motivo de dar gracias al nombre de Yahvéh. Porque allí están los tronos para el juicio, los tronos de la casa de David. Pedid la paz para Jerusalén: ¡en calma estén tus tiendas, haya paz en tus muros, en tus palacios calma! Por amor de mis hermanos y de mis amigos, quiero decir: ¡La paz contigo! ¡Por amor de la Casa de Yahvéh nuestro Dios, ruego por tu ventura!

Salmos 123
Canción de las subidas. Hacia ti levanto mis ojos, tú que habitas en los cielos. Míralos, como los ojos de los siervos en la mano de sus amos. Como los ojos de la sierva en la mano de su señora, así nuestros ojos en Yahvéh nuestro Dios, hasta que se apiade de nosotros. ¡Ten piedad de nosotros, Yahvéh, ten piedad de nosotros, que estamos saturados de desprecio! ¡Nuestra alma está por demás saturada del sarcasmo de los satisfechos, el desprecio es para los soberbios!

Salmos 124
Canción de las subidas. De David. Si Yahvéh no hubiera estado por nosotros, - que lo diga Israel - si Yahvéh no hubiera estado por nosotros, cuando contra nosotros se alzaron los hombres, vivos entonces nos habrían tragado en el fuego de su cólera. Entonces las aguas nos habrían anegado, habría pasado sobre nosotros un torrente, habrían pasado entonces sobre nuestra alma aguas voraginosas. ¡Bendito sea Yahvéh que no nos hizo presa de sus dientes! Nuestra alma como un pájaro escapó del lazo de los cazadores. El lazo se rompió y nosotros escapamos; nuestro socorro en el nombre de Yahvéh, que hizo el cielo y la tierra.

Salmos 125
Canción de las subidas. Los que confían en Yahvéh son como el monte Sión: no tiembla, asentado para siempre. ¡Jerusalén, de montes rodeada! Así Yahvéh rodea a su pueblo desde ahora y por siempre. Jamás ha de caer el cetro de impiedad sobre la suerte de los justos, para que los justos no alarguen a la maldad su mano. Haz bien, Yahvéh, a los buenos, a los de recto corazón. ¡Más a los que yerran por sus caminos tortuosos, los suprima Yahvéh con los agentes de mal! ¡Paz a Israel!

Salmos 126
Canción de las subidas. Cuando Yahvéh hizo volver a los cautivos de Sión, nos parecía soñar; entonces se llenó de risa nuestra boca y nuestros labios de gritos de alegría. Entonces se decía entre las naciones: ¡Grandes cosas ha hecho Yahvéh con estos! ¡Sí, grandes cosas hizo con nosotros Yahvéh, el gozo nos colmaba! ¡Haz volver, Yahvéh, a nuestros cautivos como torrentes en el Négueb! Los que siembran con lágrimas cosechan entre cánticos. Al ir, va llorando, llevando la semilla; al volver, vuelve cantando trayendo sus gavillas.

Salmos 127
Canción de las subidas. De Salomón. Si Yahvéh no construye la casa, en vano se afanan los constructores; si Yahvéh no guarda la ciudad, en vano vigila la guardia. En vano madrugáis a levantaros, el descanso retrasáis, los que coméis pan de fatigas, cuando él colma a su amado mientras duerme. La herencia de Yahvéh son los hijos, recompensa el fruto de las entrañas; como flechas en la mano del héroe, así los hijos de la juventud. Dichoso el hombre que ha llenado de ellas su aljaba; no quedarán confusos cuando tengan pleito con sus enemigos en la puerta.

Salmos 128
Canción de las subidas. ¡Dichoso el que teme a Yahvéh, y anda en sus caminos! Del trabajo de tus manos comerás, ¡dichoso tú, que todo te irá bien! Tu esposa será como parra fecunda en el secreto de tu casa. Tus hijos, como brotes de olivo en torno a tu mesa. Así será bendito el hombre que teme a Yahvéh. ¡Bendígate Yahvéh desde Sión, que veas en ventura a Jerusalén todos los días de tu vida, y veas a los hijos de tus hijos! ¡Paz a Israel!

Salmos 129
Canción de las subidas. Mucho me han asediado desde mi juventud, - que lo diga Israel - mucho me han asediado desde mi juventud, pero conmigo no han podido. Sobre mi espalda araron aradores, alargaron sus surcos. Yahvéh, el justo ha roto las coyundas de los impíos. ¡Sean avergonzados, retrocedan todos los que odian a Sión; sean como la hierba de los techos que se seca antes de arrancarla! De ella no llena el segador su mano ni su regazo el gavillador; y no dicen tampoco los que pasan: ¡Bendición de Yahvéh sobre vosotros! Nosotros os bendecimos en el nombre de Yahvéh.

Salmos 130
Canción de las subidas. Desde lo hondo a ti grito, Yahvéh. ¡Señor, escucha mi clamor! ¡Estén atentos tus oídos a la voz de mis súplicas! Si en cuenta tomas las culpas, oh Yahvéh, ¿quién, Señor, resistirá? Más el perdón se halla junto a ti, para que seas temido. Yo espero en Yahvéh, mi alma espera en su palabra; mi alma aguarda al Señor más que los centinelas la aurora; más que los centinelas la aurora, aguarde Israel a Yahvéh. Porque con Yahvéh está el amor, junto a él abundancia de rescate; él rescatará a Israel de todas sus culpas.

Salmos 131
Canción de las subidas. De David. No está inflado, Yahvéh, mi corazón, ni mis ojos subidos. No he tomado un camino de grandezas ni de prodigios que me vienen anchos. No, mantengo mi alma en paz y silencio como niño destetado en el regazo de su madre. ¡Como niño destetado está mi alma en mí! ¡Espera, Israel, en Yahvéh desde ahora y por siempre!

Salmos 132
Canción de las subidas. Acuérdate, Yahvéh, en favor de David, de todos sus desvelos, del juramento que hizo a Yahvéh, de su voto al Fuerte de Jacob: «No he de entrar bajo el techo de mi casa, no he de subir al lecho en que reposo, sueño a mis ojos no he de conceder ni quietud a mis párpados, mientras no encuentre un lugar para Yahvéh, una Morada para el Fuerte de Jacob.» Mirad: hemos oído de Ella que está en Efratá, ¡la hemos encontrado en los Campos del Bosque! ¡Vayamos a la Morada de él, ante el estrado de sus pies postrémonos! ¡Levántate, Yahvéh, hacia tu reposo, tú y el arca de tu fuerza! Tus sacerdotes se vistan de justicia, griten de alegría tus amigos. En gracia a David, tu servidor, no rechaces el rostro de tu ungido. Juró Yahvéh a David, verdad que no retractará: «El fruto de tu seno asentaré en tu trono. «Si tus hijos guardan mi alianza, el dictamen que yo les enseño, también sus hijos para siempre se sentarán sobre tu trono.» Porque Yahvéh ha escogido a Sión, la ha querido como sede para sí: «Aquí está mi reposo para siempre, en él me sentaré, pues lo he querido. «Sus provisiones bendeciré sin tasa, a sus pobres hartaré de pan, de salvación vestiré a sus sacerdotes, y sus amigos gritarán de júbilo. «Allí suscitaré a David un fuerte vástago, aprestaré una lámpara a mi ungido; de vergüenza cubriré a sus enemigos, y sobre él brillará su diadema».

Salmos 133
Canción de las subidas. De David. ¡Oh, qué bueno, qué dulce habitar los hermanos todos juntos! Como un ungüento fino en la cabeza, que baja por la barba, que baja por la barba de Aarón, hasta la orla de sus vestiduras. Como el rocío del Hermón que baja por las alturas de Sión; allí Yahvéh la bendición dispensa, la vida para siempre.

Salmos 134
Canción de las subidas. ¡Ea, bendecid a Yahvéh, todos los siervos de Yahvéh! ¡Por las noches alzad las manos hacia el santuario, y bendecid a Yahvéh! ¡Bendígate Yahvéh desde Sión, él, que hizo los cielos y la tierra!

Salmos 135
Aleluya. Alabad el nombre de Yahvéh, alabadle, siervos de Yahvéh, que servís en la Casa de Yahvéh, en los atrios de la Casa del Dios nuestro. Alabad a Yahvéh, porque es bueno Yahvéh, salmodiad a su nombre, que es amable. Pues Yahvéh se ha elegido a Jacob, a Israel, como su propiedad. Bien sé yo que es grande Yahvéh, nuestro Señor más que todos los dioses. Todo cuanto agrada a Yahvéh, lo hace en el cielo y en la tierra, en los mares y en todos los abismos. Levantando las nubes desde el extremo de la tierra, para la lluvia hace él los relámpagos, saca de sus depósitos el viento. Él hirió a los primogénitos de Egipto, desde el hombre al ganado; mandó señales y prodigios en medio de ti, Egipto, contra Faraón y todos sus siervos. Hirió a naciones en gran número, dio muerte a reyes poderosos, a Sijón, rey de los amorreos, a Og, rey de Basán, y a todos los reinos de Canaán; y dio sus tierras en herencia, en herencia a su pueblo Israel. ¡Yahvéh, tu nombre para siempre, Yahvéh, tu memoria de edad en edad! Porque Yahvéh a su pueblo hace justicia, y se compadece de sus siervos. Los ídolos de las naciones, plata y oro, obra de manos de hombre tienen boca y no hablan, tienen ojos y no ven; tienen oídos y no oyen, ni un soplo siquiera hay en su boca. Como ellos serán los que los hacen, cuantos en ellos ponen su confianza. Casa de Israel, bendecid a Yahvéh, casa de Aarón, bendecid a Yahvéh, casa de Leví, bendecid a Yahvéh, los que a Yahvéh teméis, bendecid a Yahvéh. ¡Bendito sea Yahvéh desde Sión, el que habita en Jerusalén!

Salmos 136
¡Dad gracias a Yahvéh, porque es bueno, porque es eterno su amor! Dad gracias al Dios de los dioses, porque es eterno su amor; dad gracias al Señor de los señores, porque es eterno su amor. Él solo hizo maravillas, porque es eterno su amor. Hizo los cielos con inteligencia, porque es eterno su amor; sobre las aguas asentó la tierra, porque es eterno su amor. Hizo las grandes lumbreras, porque es eterno su amor; el sol para regir el día, porque es eterno su amor; la luna y las estrellas para regir la noche, porque es eterno su amor. Hirió en sus primogénitos a Egipto, porque es eterno su amor; y sacó a Israel de entre ellos, porque es eterno su amor; con mano fuerte y tenso brazo, porque es eterno su amor. El mar de Suf partió en dos, porque es eterno su amor; por medio a Israel hizo pasar, porque es eterno su amor; y hundió en él a Faraón con sus huestes, porque es eterno su amor. Guio a su pueblo en el desierto, porque es eterno su amor; hirió a grandes reyes, porque es eterno su amor; y dio muerte a reyes poderosos, porque es eterno su amor; a Sijón, rey de los amorreos, porque es eterno su amor; y a Og, rey de Basán, porque es eterno su amor. Y dio sus tierras en herencia, porque es eterno su amor; en herencia a su siervo Israel, porque es eterno su amor. En nuestra humillación se acordó de nosotros, porque es eterno su amor; y nos libró de nuestros adversarios, porque es eterno su amor. Él da el pan a toda carne, porque es eterno su amor; ¡Dad gracias al Dios de los cielos, porque es eterno su amor!

Salmos 137
A orillas de los ríos de Babilonia estábamos sentados y llorábamos, acordándonos de Sión; en los álamos de la orilla teníamos colgadas nuestras cítaras. Allí nos pidieron nuestros deportadores cánticos, nuestros raptores alegría: «¡Cantad para nosotros un cantar de Sión!» ¿Cómo podríamos cantar un canto de Yahvéh en una tierra extraña? ¡Jerusalén, si yo de ti me olvido, que se seque mi diestra! ¡Mi lengua se me pegue al paladar si de ti no me acuerdo, si no alzo a Jerusalén al colmo de mi gozo! Acuérdate, Yahvéh, contra los hijos de Edom, del día de Jerusalén, cuando ellos decían: ¡Arrasad, arrasadla hasta sus cimientos! ¡Hija de Babel, devastadora, feliz quien te devuelva el mal que nos hiciste, feliz quien agarre y estrelle contra la roca a tus pequeños!

Salmos 138
De David. Te doy gracias, Yahvéh, de todo corazón, porque has oído las palabras de mi boca. Hacia tu santo Templo me prosterno. Doy gracias a tu nombre por tu amor y tu verdad, pues tu promesa ha superado tu renombre. El día en que grité, tú me escuchaste, aumentaste la fuerza en mi alma. Te dan gracias, Yahvéh, todos los reyes de la tierra, porque oyen las promesas de tu boca; y cantan los caminos de Yahvéh: «¡Qué grande la gloria de Yahvéh! ¡Excelso es Yahvéh, y ve al humilde, al soberbio le conoce desde lejos!» Si ando en medio de angustias, tú me das la vida, frente a la cólera de mis enemigos, extiendes tú la mano y tu diestra me salva: Yahvéh lo acabará todo por mí. ¡Oh Yahvéh, es eterno tu amor, no dejes la obra de tus manos!

Salmos 139
Del maestro de coro. De David. Salmo. Yahvéh, tú me escrutas y conoces; sabes cuándo me siento y cuándo me levanto, mi pensamiento calas desde lejos; esté yo en camino o acostado, tú lo adviertes, familiares te son todas mis sendas. Que no está aún en mi lengua la palabra, y ya tú, Yahvéh, la conoces entera; me aprietas por detrás y por delante, y tienes puesta sobre mí tu mano. Ciencia es misteriosa para mí, harto alta, no puedo alcanzarla. ¿A dónde iré yo lejos de tu espíritu, a dónde de tu rostro podré huir? Si hasta los cielos subo, allí estás tú, si en el seol me acuesto, allí te encuentras. Si tomo las alas de la aurora, si voy a parar a lo último del mar, también allí tu mano me conduce, tu diestra me aprehende. Aunque diga: «¡Me cubra al menos la tiniebla, y la noche sea en torno a mí un ceñidor, ni la misma tiniebla es tenebrosa para ti, y la noche es luminosa como el día. Porque tú mis riñones has formado, me has tejido en el vientre de mi madre; yo te doy gracias por tantas maravillas: prodigio soy, prodigios son tus obras. Mi alma conocías cabalmente, y mis huesos no se te ocultaban, cuando era yo formado en lo secreto, tejido en las honduras de la tierra. Mi embrión tus ojos lo veían; en tu libro están inscritos todos los días que han sido señalados, sin que aún exista uno solo de ellos. Más para mí ¡qué arduos son tus pensamientos, oh, Dios, qué incontable su suma! ¡Son más, si los recuento, que la arena, y al terminar, todavía estoy contigo! ¡Ah, si al impío, oh Dios, mataras, si los hombres sanguinarios se apartaran de mí! Ellos que hablan de ti dolosamente, tus adversarios que se alzan en vano. ¿No odio, Yahvéh, a quienes te odian? ¿No me asquean los que se alzan contra ti? Con odio colmado los odio, son para mí enemigos. Sóndame, oh Dios, mi corazón conoce, pruébame, conoce mis desvelos; mira no haya en mí camino de dolor, y llévame por el camino eterno.

Salmos 140
Del maestro de coro. Salmo. De David. Líbrame, Yahvéh, del hombre malvado, los que en su corazón maquinan malas cosas, y peleas albergan todo el día, aguzan su lengua igual que una serpiente, veneno de víbora hay bajo sus labios. Pausa. Presérvame, Yahvéh, de las manos del impío, del hombre violento guárdame, los que proyectan trastornar mis pasos, los insolentes que me han ocultado cepo y lazos, y tienden una red bajo mis pies, y al borde del sendero me han emplazado trampas. Pausa. Yo he dicho a Yahvéh: Tú eres mi Dios, escucha, Yahvéh, la voz de mis súplicas. Oh Yahvéh, Señor mío, fuerza de mi salvación, tú cubres mi cabeza el día del combate. No otorgues, Yahvéh, al impío su deseo, no dejes que su plan se realice. Los que me asedian no alcen sobre mí su cabeza, Pausa. ahóguelos la malicia de sus labios; llueva sobre ellos carbones encendidos, en el abismo hundidos, no se levanten más; no arraigue más en la tierra el deslenguado. al violento lo atrape de golpe la desgracia. Sé que Yahvéh al humilde hará justicia, y llevará el juicio de los pobres. Sí, los justos darán gracias a tu nombre, los rectos morarán en tu presencia.

Salmos 141
Salmo. De David. Yahvéh, a ti te llamo, ven pronto a mí, escucha mi voz cuando te llamo. Valga ante ti mi oración como incienso, el alzar de mis manos como oblación de la tarde. Pon, Yahvéh, en mi boca un centinela, un vigía a la puerta de mis labios. No dejes que tienda mi corazón a cosa mala, a perpetrar acciones criminales en compañía de malhechores, y no guste yo lo que hace sus delicias. Que el justo me hiera por amor, y me corrija, pero el ungüento del impío jamás lustre mi cabeza, pues me comprometería aún más en sus malas cosas. Han quedado a merced de la Roca, su juez, los que oyeron con regodeo mis palabras: «Como piedra de molino estrellada por tierra son esparcidos nuestros huesos a la boca del seol.» Hacia ti, Señor Yahvéh, miran mis ojos, ¡en ti me cobijo, no desampares mi alma! Guárdame del lazo que me tienden, de la trampa de los malhechores. Caigan los impíos, cada uno en su red, mientras yo paso indemne.

Salmos 142
Poema. De David. Cuando estaba en la cueva. Oración. A voz en grito clamo a Yahvéh, a voz en grito suplico a Yahvéh. Ante él derramo mi lamento, mi angustia ante él expongo, cuando el aliento en mí se apaga; más tú conoces mi sendero. En el camino por donde voy me han escondido un lazo. A la derecha mira, y ve, nadie hay que me conozca. Huye de mí todo refugio, nadie hay que cuide de mi alma. Hacia ti clamo, Yahvéh; digo: ¡Tú, mi refugio, mi porción en la tierra de los vivos! Atiende a mi clamor, pues estoy abatido del todo. ¡Líbrame tú de mis perseguidores, pues son más fuertes que yo! ¡Saca mi alma de la cárcel, y daré gracias a tu nombre! En torno a mí los justos harán corro, por tu favor para conmigo.

Salmos 143
Salmo. De David. ¡Yahvéh, escucha mi oración, atiende a mis súplicas, por tu lealtad, respóndeme por tu justicia! No entres en juicio con tu siervo, pues no es justo ante ti ningún viviente. Persigue mi alma el enemigo, mi vida estrella contra el suelo; me hace morar en las tinieblas, como los que han muerto para siempre; se apaga en mí el aliento, mi corazón dentro de mí enmudece. Me acuerdo de los días de antaño, medito en todas tus acciones, pondero las obras de tus manos; hacia ti mis manos tiendo, mi alma es como una tierra que tiene sed de ti. Pausa. ¡Oh, pronto, respóndeme, Yahvéh, el aliento me falta; no escondas lejos de mí tu rostro, pues sería yo como los que bajan a la fosa! Haz que sienta tu amor a la mañana, porque confío en ti; hazme saber el camino a seguir, porque hacia ti levanto mi alma. Líbrame de mis enemigos, Yahvéh en ti me refugio; enséñame a cumplir tu voluntad, porque tú eres mi Dios; tu espíritu que es bueno me guíe por una tierra llana. Por tu nombre, Yahvéh, dame la vida, por tu justicia saca mi alma de la angustia; por tu amor aniquila a mis enemigos, pierde a todos los que oprimen mi alma, porque yo soy tu servidor.

Salmos 144
De David. Bendito sea Yahvéh, mi Roca, que adiestra mis manos para el combate, mis dedos para la pelea; él, mi amor y mi baluarte, mi ciudadela y mi libertador, mi escudo en el que me cobijo, el que los pueblos somete a mi poder. Yahvéh, ¿qué es el hombre para que le conozcas, el hijo de hombre para que en él pienses? El hombre es semejante a un soplo, sus días, como sombra que pasa. ¡Yahvéh, inclina tus cielos y desciende, toca los montes, que echen humo; fulmina el rayo y desconciértalos, lanza tus flechas y trastórnalos! Extiende tu mano desde lo alto, sálvame, líbrame de las muchas aguas, de la mano de los hijos de extranjeros, cuya boca profiere falsedad y cuya diestra es diestra de mentira. Oh Dios, quiero cantarte un canto nuevo, salmodiar para ti al arpa de diez cuerdas, tú que das a los reyes la victoria, que salvas a David tu servidor. De espada de infortunio sálvame. líbrame de la mano de extranjeros, cuya boca profiere falsedad y cuya diestra es diestra de mentira. Sean nuestros hijos como plantas florecientes en su juventud, nuestras hijas como columnas angulares, esculpidas como las de un palacio; nuestros graneros llenos, rebosantes de frutos de toda especie, nuestras ovejas, a millares, a miríadas, por nuestras praderías; nuestras bestias bien cargadas; no haya brecha ni salida, ni grito en nuestras plazas. ¡Feliz el pueblo a quien así sucede, feliz el pueblo cuyo Dios es Yahvéh!

Salmos 145
Himno. De David. Te exaltaré, mi Dios, mi Rey, por siempre jamás bendeciré tu nombre. Todos los días te bendeciré, por siempre jamás alabaré tu nombre; grande es Yahvéh y muy digno de alabanza, insondable su grandeza. Una edad a otra encomiará tus obras, pregonará tus proezas. El esplendor, la gloria de tu majestad, el relato de tus maravillas, yo recitaré. Del poder de tus portentos se hablará, y yo tus grandezas contaré; se hará memoria de tu inmensa bondad, se aclamará tu justicia. Clemente y compasivo es Yahvéh, tardo a la cólera y grande en amor; bueno es Yahvéh para con todos, y sus ternuras sobre todas sus obras. Te darán gracias, Yahvéh, todas tus obras y tus amigos te bendecirán; dirán la gloria de tu reino, de tus proezas hablarán, para mostrar a los hijos de Adán tus proezas, el esplendor y la gloria de tu reino. Tu reino, un reino por los siglos todos, tu dominio, por todas las edades. Yahvéh es fiel en todas sus palabras, en todas sus obras amoroso; Yahvéh sostiene a todos los que caen, a todos los encorvados endereza. Los ojos de todos fijos en ti, esperan que les des a su tiempo el alimento; abres la mano tú y sacias a todo viviente a su placer. Yahvéh es justo en todos sus caminos, en todas sus obras amoroso; cerca está Yahvéh de los que le invocan, de todos los que le invocan con verdad. Él cumple el deseo de los que le temen, escucha su clamor y los libera; guarda Yahvéh a cuantos le aman, a todos los impíos extermina. ¡La alabanza de Yahvéh diga mi boca, y toda carne bendiga su nombre sacrosanto, para siempre jamás!

Salmos 146
Aleluya. ¡Alaba, alma mía, a Yahvéh! A Yahvéh, mientras viva, he de alabar, mientras exista salmodiaré para mi Dios. No pongáis vuestra confianza en príncipes, en un hijo de hombre, que no puede salvar; su soplo exhala, a su barro retorna, y en ese día sus proyectos fenecen. Feliz aquel que en el Dios de Jacob tiene su apoyo, y su esperanza en Yahvéh su Dios, que hizo los cielos y la tierra, el mar y cuanto en ellos hay; que guarda por siempre lealtad, hace justicia a los oprimidos, da el pan a los hambrientos, Yahvéh suelta a los encadenados. Yahvéh abre los ojos a los ciegos, Yahvéh a los encorvados endereza, Ama Yahvéh a los justos, Yahvéh protege al forastero, a la viuda y al huérfano sostiene. más el camino de los impíos tuerce; Yahvéh reina para siempre, tu Dios, Sión, de edad en edad.

Salmos 147
Aleluya. Alabad a Yahvéh, que es bueno salmodiar, a nuestro Dios, que es dulce la alabanza. Edifica Yahvéh a Jerusalén, congrega a los deportados de Israel; él sana a los de roto corazón, y venda sus heridas. Él cuenta el número de estrellas, y llama a cada una por su nombre; grande es nuestro Señor, y de gran fuerza, no tiene medida su saber. Yahvéh sostiene a los humildes, hasta la tierra abate a los impíos. Cantad a Yahvéh en acción de gracias, salmodiad a la cítara para nuestro Dios: El que cubre de nubes los cielos, el que lluvia a la tierra prepara, el que hace germinar en los montes la hierba, y las plantas para usos del hombre, el que dispensa al ganado su sustento, a las crías del cuervo cuando chillan. No le agrada el brío del caballo, ni se complace en los músculos del hombre. Se complace Yahvéh en los que le temen, en los que esperan en su amor. ¡Celebra a Yahvéh, Jerusalén, alaba a tu Dios, Sión! Que él ha reforzado los cerrojos de tus puertas, ha bendecido en ti a tus hijos; pone paz en tu término, te sacia con la flor del trigo. Él envía a la tierra su mensaje, a toda prisa corre su palabra; como lana distribuye la nieve, esparce la escarcha cual ceniza. Arroja su hielo como migas de pan, a su frío ¿quién puede resistir? Envía su palabra y hace derretirse, sopla su viento y corren las aguas. Él revela a Jacob su palabra, sus preceptos y sus juicios a Israel: no hizo tal con ninguna nación, ni una sola sus juicios conoció.

Salmos 148
Aleluya. Alabad a Yahvéh desde los cielos, alabadle en las alturas; alabadle, ángeles suyos todos, todas sus huestes, alabadle! ¡Alabadle, sol y luna, alabadle todas las estrellas de luz, alabadle, cielos de los cielos, y aguas que estáis encima de los cielos! Alaben ellos el nombre de Yahvéh: pues él ordenó y fueron creados; él los fijó por siempre, por los siglos, ley les dio que no pasará. ¡Alabad a Yahvéh desde la tierra, monstruos del mar y todos los abismos, fuego y granizo, nieve y bruma, viento tempestuoso, ejecutor de su palabra, montañas y todas la colinas, árbol frutal y cedros todos, fieras y todos los ganados, reptil y pájaro que vuela, reyes de la tierra y pueblos todos, príncipes y todos los jueces de la tierra, jóvenes y doncellas también, viejos junto con los niños! Alaben el nombre de Yahvéh: porque solo su nombre es sublime, su majestad por encima de la tierra y el cielo. Él realza la frente de su pueblo, de todos sus amigos alabanza, de los hijos de Israel, pueblo de sus íntimos.

Salmos 149
Aleluya. Cantad a Yahvéh un canto nuevo, su alabanza en la asamblea de sus amigos! ¡Regocíjese Israel en su hacedor, los hijos de Sión exulten en su rey; alaben su nombre con la danza, con tamboril y cítara salmodien para él! Porque Yahvéh en su pueblo se complace, adorna de salvación a los humildes. Exalten de gloria sus amigos, desde su lecho griten de alegría: los elogios de Dios en su garganta, y en su mano la espada de dos filos; para ejecutar venganza en las naciones, castigos en los pueblos, para atar con cadenas a sus reyes, con grillos de hierro a sus magnates, para aplicarles la sentencia escrita: ¡será un honor para todos sus amigos!

Salmos 150
Aleluya. Alabad a Dios en su santuario, alabadle en su augusto firmamento. alabadle por sus grandes hazañas, alabadle por su inmensa grandeza. Alabadle con clangor de cuerno, alabadle con arpa y con cítara, alabadle con tamboril y danza, alabadle con laúd y flauta, alabadle con címbalos sonoros, alabadle con címbalos de aclamación. ¡Todo cuanto respira alabe a Yahvéh! ¡Aleluya!
